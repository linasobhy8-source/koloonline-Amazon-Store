# .github/workflows/deploy-vercel.yml
name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ سحب الكود من GitHub
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ تثبيت dependencies بدون package-lock.json
      - name: Install dependencies
        run: npm install --force

      # 4️⃣ خطوة build (مش ضرورية لمشروعك Express)
      - name: Build project
        run: echo "No build needed for Express static server"

      # 5️⃣ نشر المشروع على Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          prod: true
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          FB_PIXEL_ID: ${{ secrets.FB_PIXEL_ID }}
          VERCEL_ANALYTICS_ID: ${{ secrets.VERCEL_ANALYTICS_ID }}
          AMAZON_US: ${{ secrets.AMAZON_US }}
          AMAZON_CA: ${{ secrets.AMAZON_CA }}
          AMAZON_EG: ${{ secrets.AMAZON_EG }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      # 6️⃣ اختبار الموقع بعد النشر
      - name: Test deployed site
        run: |
          URL=$(npx vercel --token ${{ secrets.VERCEL_TOKEN }} inspect ${{ secrets.VERCEL_PROJECT_ID }} --json | jq -r '.url')
          echo "Testing deployed URL: $URL"
          curl -f "https://$URL" || exit 1
