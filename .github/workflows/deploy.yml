# .github/workflows/vercel-deploy.yml
name: Deploy to Vercel

on:
  push:
    branches:
      - main  # أي push على الفرع main سيؤدي إلى النشر التلقائي
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ سحب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ تثبيت الباكدجات
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build المشروع إذا موجود (React / Next.js أو أي frontend build)
      - name: Build project
        run: npm run build || echo "No build script found, skipping"

      # 5️⃣ نشر المشروع على Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          prod: true

      # 6️⃣ اختبار endpoint بعد النشر
      - name: Test deployed site
        run: |
          curl -f https://koloonline-store.vercel.app || exit 1
