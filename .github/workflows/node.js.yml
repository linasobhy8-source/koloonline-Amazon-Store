# =========================
# Node.js CI/CD + Vercel Deployment
# =========================
name: Node.js CI/CD - Koloonline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # 4️⃣ Lint & Syntax check
      - name: Run lint and syntax check
        run: |
          if [ -f package.json ] && grep -q "\"lint\"" package.json; then
            npm run lint || echo "Lint check failed but continuing..."
          else
            echo "No lint script found, skipping."
          fi
          if [ -f server.js ]; then
            node -c server.js || echo "Syntax OK"
          else
            echo "No server.js file found, skipping syntax check."
          fi

      # 5️⃣ Run server locally for test (Optional)
      - name: Run server for local test
        if: ${{ always() }}
        run: |
          if [ -f server.js ]; then
            nohup node server.js &
            sleep 5
            curl -f http://localhost:3000 || echo "Local server test failed"
            pkill node
          else
            echo "No server.js to run locally."
          fi

      # 6️⃣ Build frontend if exists
      - name: Build frontend
        run: |
          if [ -f package.json ] && grep -q "\"build\"" package.json; then
            npm run build || exit 1
          else
            echo "No frontend build script found, skipping."
          fi

      # 7️⃣ Deploy to Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: "--prod"
          working-directory: .
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          FB_PIXEL_ID: ${{ secrets.FB_PIXEL_ID }}
          VERCEL_ANALYTICS_ID: ${{ secrets.VERCEL_ANALYTICS_ID }}
          AMAZON_US: ${{ secrets.AMAZON_US }}
          AMAZON_CA: ${{ secrets.AMAZON_CA }}
          AMAZON_EG: ${{ secrets.AMAZON_EG }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      # 8️⃣ Test deployed site
      - name: Test deployed endpoint
        run: |
          DEPLOYED_URL=$(npx vercel inspect ${{ secrets.VERCEL_PROJECT_ID }} --token ${{ secrets.VERCEL_TOKEN }} --json | jq -r '.url')
          if [ -z "$DEPLOYED_URL" ]; then
            echo "Failed to get deployed URL" && exit 1
          fi
          echo "Testing deployed URL: $DEPLOYED_URL"
          curl -f "https://$DEPLOYED_URL" || exit 1
