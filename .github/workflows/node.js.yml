name: Node.js CI/CD - Koloonline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ سحب الكود من GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # تم التحديث من 18 إلى 20
          cache: 'npm'

      # 3️⃣ تثبيت الباكدجات
      - name: Install dependencies
        run: npm install

      # 4️⃣ فحص الكود (Syntax & Lint)
      - name: Run lint and syntax check
        run: |
          npm run lint || echo "Lint check failed but continue"
          node -c server.js || echo "Syntax OK"

      # 5️⃣ تشغيل السيرفر محليًا لاختبار endpoint
      # يمكن إضافة خطوات اختبار أخرى هنا لاحقًا
