# Deploy HTML + ExpressJS + Vercel + Analytics
name: Build & Deploy Koloonline Store

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # 4️⃣ Build frontend if script exists
      - name: Build frontend
        run: |
          if [ -f package.json ] && grep -q "\"build\"" package.json; then
            npm run build
          else
            echo "No frontend build script, skipping."

      # 5️⃣ Run Express server locally to test
      - name: Test Express server locally
        run: |
          if [ -f server.js ]; then
            nohup node server.js &
            sleep 5
            curl -f http://localhost:3000 || exit 1
          else
            echo "No server.js found, skipping local test."

      # 6️⃣ Deploy to Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: "--prod"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          FB_PIXEL_ID: ${{ secrets.FB_PIXEL_ID }}
          AMAZON_US: ${{ secrets.AMAZON_US }}
          AMAZON_CA: ${{ secrets.AMAZON_CA }}
          AMAZON_EG: ${{ secrets.AMAZON_EG }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      # 7️⃣ Test deployed site
      - name: Test deployed site
        run: |
          URL=$(npx vercel inspect ${{ secrets.VERCEL_PROJECT_ID }} --token ${{ secrets.VERCEL_TOKEN }} --json | jq -r '.url')
          echo "Testing deployed URL: $URL"
          curl -f "https://$URL" || exit 1
