<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline SaaS Store | Tracking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= GTM ================= -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8KBN"></script>

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');
</script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{
background:#232f3e;color:#fff;padding:12px;
text-align:center;
}

.hero{text-align:center;background:#fff;padding:20px}

.navbar{
display:flex;justify-content:space-between;
padding:10px;background:#37475a;flex-wrap:wrap;
}

.navbar input{width:50%;padding:8px}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;padding:20px;
}

.card{
background:#fff;padding:10px;border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.buy-btn{
background:#ff9900;border:none;
padding:10px;margin-top:8px;
cursor:pointer;
width:100%;
}
</style>

</head>

<body>

<header>🔥 Koloonline SaaS Store</header>

<div class="hero">
<h2>Smart Tracking Store 🚀</h2>
<button class="buy-btn" onclick="scrollToProducts()">Shop Now</button>
</div>

<div class="navbar">
<input id="search" placeholder="Search products...">
<span>Cart: <b id="cartCount">0</b></span>
</div>

<div id="products" class="products"></div>

<footer style="text-align:center;padding:20px;background:#232f3e;color:#fff;">
© 2026 Koloonline SaaS
</footer>

<script>

/* ================= PRODUCTS ================= */
let products = [
{
asin:"B09V7Z4TJG",
title:"Smart Watch Pro",
price:39.99
}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ================= BACKEND URL (IMPORTANT) ================= */
/* غيري الرابط ده بعد ما ترفعي السيرفر */
const API_URL = "https://your-backend-url.com";

/* ================= AFFILIATE TAG ================= */
function getAffiliateTag(){

let lang = navigator.language || "en-US";

if(lang.includes("ar")) return "onlinesh03f31-21";
if(lang.includes("en-CA")) return "linasobhy20d8-20";
if(lang.includes("pl")) return "koloonline-21";

return "koloonlinesto-20";
}

/* ================= TRACK SYSTEM ================= */
async function track(type, asin){

if(!asin) return;

try{
await fetch(`${API_URL}/track`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
asin,
type,
country:navigator.language || "unknown"
})
});
}catch(err){
console.log("tracking error");
}

}

/* ================= RENDER ================= */
function render(){

let html = "";

products.forEach(p=>{
html += `
<div class="card">
<h3>${p.title}</h3>
<p>$${p.price}</p>

<button class="buy-btn" onclick="buyNow('${p.asin}')">
Buy Now
</button>

<button class="buy-btn" style="background:#232f3e;color:#fff;"
onclick="addToCart('${p.asin}')">
Add to Cart
</button>

<button class="buy-btn" style="background:green;color:#fff;"
onclick="orderWhatsApp('${p.title}','${p.asin}')">
WhatsApp
</button>

</div>
`;
});

document.getElementById("products").innerHTML = html;
}

/* ================= BUY ================= */
function buyNow(asin){

track("click",asin);

let tag = getAffiliateTag();

window.open(
`https://www.amazon.com/dp/${asin}?tag=${tag}`,
"_blank"
);
}

/* ================= CART ================= */
function addToCart(asin){

cart.push(asin);
localStorage.setItem("cart",JSON.stringify(cart));

document.getElementById("cartCount").innerText = cart.length;

track("cart",asin);
}

/* ================= WHATSAPP ================= */
function orderWhatsApp(product, asin){

track("whatsapp",asin);

let phone="201XXXXXXXXX";

let msg=`I want to order: ${product}`;

window.open(
`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,
"_blank"
);
}

/* ================= SCROLL ================= */
function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

/* ================= INIT ================= */
render();
document.getElementById("cartCount").innerText = cart.length;

</script>

</body>
</html>
