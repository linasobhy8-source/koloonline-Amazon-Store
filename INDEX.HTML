<script>

let products = [];

// ================= LOAD PRODUCTS FROM API =================
async function loadProducts(){
  const res = await fetch("/api/products");
  products = await res.json();
  displayProducts(products);
}

// ================= DISPLAY =================
function displayProducts(list){
  let html = "";

  list.forEach(p=>{
    html += `
      <div class="card">
        <img src="${p.image}">

        <div class="card-content">
          <h3>${p.title}</h3>
          <p>$${p.price}</p>
        </div>

        <button class="buy-btn" onclick="openProduct('${p.asin}','${p.id}')">
          🔥 Order Now
        </button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ================= OPEN PRODUCT PAGE =================
function openProduct(asin,id){
  window.location.href = "product.html?id=" + id;
}

// ================= SEARCH =================
function smartSuggest(){
  let input = document.getElementById("searchInput").value.toLowerCase();

  let filtered = products.filter(p =>
    p.title.toLowerCase().includes(input)
  );

  displayProducts(filtered);
}

// ================= ENTER =================
function handleEnter(e){
  if(e.key === "Enter"){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let first = products.find(p => p.title.toLowerCase().includes(input));

    if(first){
      openProduct(first.asin, first.id);
    }
  }
}

// INIT
loadProducts();

</script>
