<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store | Best Amazon Deals 2026</title>
<meta name="description" content="Best Amazon deals, smart watches, gadgets and trending products.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">

<!-- Favicon -->
<link rel="icon" href="https://github.com/linasobhy8-source/koloonline-Amazon-Store/blob/main/1000276894.png">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

/* HEADER */
header{
background:#232f3e;color:#fff;padding:12px;
display:flex;align-items:center;justify-content:center;gap:10px;
}
header img{height:40px}

/* HERO */
.hero{text-align:center;background:#fff;padding:25px}
.hero img{height:80px}
.hero button{cursor:pointer}

/* NAV */
.navbar{
display:flex;justify-content:space-between;flex-wrap:wrap;
padding:10px;background:#37475a;position:relative;
}
.navbar input{
width:45%;padding:8px;border:none;border-radius:4px
}
.navbar button{
background:#ff9900;border:none;padding:8px;
border-radius:4px;font-weight:bold;cursor:pointer;margin:3px
}

/* suggestions */
#suggestions{
position:absolute;top:45px;left:10px;
background:#fff;width:45%;
z-index:999;border-radius:6px;
box-shadow:0 4px 10px rgba(0,0,0,0.2)
}

/* FILTER */
.filters{text-align:center;padding:10px}
.filters button{
background:#ff9900;color:#fff;border:none;padding:8px;margin:4px;border-radius:6px;cursor:pointer;
}
.filters button:hover{background:#e68900}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;padding:20px
}

.card{
background:#fff;border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;
}
.card img{width:100%;height:200px;object-fit:contain}
.card-content{text-align:center;padding:10px}
.card-content p{color:#b12704;font-weight:bold;margin:5px 0}
.card-content h3{margin:5px 0;font-size:18px}

/* BUTTONS */
.buy-btn{
background:#ff9900;border:none;
width:90%;margin:5px auto;
display:flex;align-items:center;justify-content:center;
gap:6px;padding:10px;font-weight:bold;
cursor:pointer;border-radius:6px;transition:0.2s
}
.buy-btn img{height:18px}
.buy-btn:hover{background:#e68900; transform:scale(1.05)}

/* FOOTER */
footer{
background:#232f3e;color:#fff;
text-align:center;padding:20px;margin-top:20px
}
footer img{height:30px;margin-bottom:5px}
</style>
</head>

<body>

<header>
<img src="https://github.com/linasobhy8-source/koloonline-Amazon-Store/blob/main/1000276894.png">
<span>Koloonline</span>
</header>

<div class="hero">
<img src="https://github.com/linasobhy8-source/koloonline-Amazon-Store/blob/main/1000276894.png"><br><br>
<h2>Your Global Connection 🌍</h2>
<button onclick="scrollToProducts()" class="buy-btn" style="width:auto">
<img src="https://github.com/linasobhy8-source/koloonline-Amazon-Store/blob/main/1000276894.png"> Shop Now
</button>
</div>

<div class="navbar">
<input type="text" id="searchInput" placeholder="Search..." oninput="smartSuggest()">
<div id="suggestions"></div>
<button onclick="goToCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>
</div>

<!-- Filters -->
<div class="filters">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('electronics')">Electronics</button>
<button onclick="filterCategory('wearables')">Wearables</button>
</div>

<!-- Products Grid -->
<div id="products" class="products"></div>

<footer>
<img src="https://github.com/linasobhy8-source/koloonline-Amazon-Store/blob/main/1000276894.png"><br>
<p>© 2026 Koloonline</p>
</footer>

<script>
// fallback products
let products=[
{
title:"Echo Dot 5",
asin:"B09B8Q3YHJ",
price:39.99,
category:"electronics",
image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg"
},
{
title:"Smart Watch Pro",
asin:"B09V7Z4TJG",
price:49.99,
category:"wearables",
image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"
}
];

// Load from API (optional)
async function loadProducts(){
try{
let res=await fetch("/api/products");
let data=await res.json();
if(data.products) products=data.products;
}catch(e){ console.log("fallback products loaded"); }
displayProducts(products);
}
loadProducts();

// Build affiliate link
function buildLink(asin){
return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

// Display products
function displayProducts(list){
let html="";
list.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>$${p.price}</p>
<p>⭐ 4.5 (1200 reviews) 🔥 Limited Offer</p>
</div>
<button class="buy-btn" onclick='addToCart(${JSON.stringify(p)})'>
<img src="https://github.com/linasobhy8-source/koloonline-Amazon-Store/blob/main/1000276894.png"> Add
</button>
<button class="buy-btn" onclick='buyNow("${p.asin}")'>
🔥 Buy
</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;
}

// Search suggestions
let timer;
function smartSuggest(){
clearTimeout(timer);
timer=setTimeout(()=>{
let q=document.getElementById("searchInput").value.toLowerCase();
let results=products.filter(p=>p.title.toLowerCase().includes(q));
displayProducts(results);
let sug="";
results.slice(0,5).forEach(p=>{
sug+=`<div onclick="selectProduct('${p.title}')" style="padding:8px;cursor:pointer">${p.title}</div>`;
});
document.getElementById("suggestions").innerHTML=sug;
},200);
}

function selectProduct(t){
document.getElementById("searchInput").value=t;
document.getElementById("suggestions").innerHTML="";
smartSuggest();
}

// Filter categories
function filterCategory(cat){
if(cat==="all"){displayProducts(products);return;}
displayProducts(products.filter(p=>p.category===cat));
}

// Cart
let cart=JSON.parse(localStorage.getItem("cart")||"[]");
function addToCart(p){
cart.push(p);
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
trackEvent(p,"click");
}
function updateCart(){
document.getElementById("cartCount").innerText=cart.length;
}
updateCart();
function goToCart(){ window.location.href="/cart.html"; }

// Buy now
function buyNow(asin){
trackEvent({asin,type:"click",country:"EG"});
window.open(buildLink(asin),"_blank");
}

// Scroll
function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

// Tracking
function trackEvent(p,type="click"){
fetch("/track",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({asin:p.asin || p, type:type, country:"EG"})
});
}
</script>

</body>
</html>
