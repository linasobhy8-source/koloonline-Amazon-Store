<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store | Best Amazon Deals 2026</title>
<meta name="description" content="Best Amazon deals, smart watches, gadgets and trending products.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">

<link rel="icon" href="favicon.ico">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

/* HEADER */
header{
background:#232f3e;color:#fff;padding:12px;
display:flex;align-items:center;justify-content:center;gap:10px;
}
header img{height:40px}

/* HERO */
.hero{text-align:center;background:#fff;padding:25px}
.hero img{height:80px}

/* NAV */
.navbar{
display:flex;justify-content:space-between;
padding:10px;background:#37475a;flex-wrap:wrap;
position:relative
}
.navbar input{
width:45%;padding:8px;border:none;border-radius:4px
}
.navbar button{
background:#ff9900;border:none;padding:8px;
border-radius:4px;font-weight:bold;cursor:pointer;margin:3px
}

/* suggestions */
#suggestions{
position:absolute;top:45px;left:10px;
background:#fff;width:45%;
z-index:999;border-radius:6px;
box-shadow:0 4px 10px rgba(0,0,0,0.2)
}

/* FILTER */
.filters{text-align:center;padding:10px}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;padding:20px
}

.card{
background:#fff;border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden
}
.card img{width:100%;height:200px;object-fit:contain}
.card-content{text-align:center;padding:10px}
.card-content p{color:#b12704;font-weight:bold}

.buy-btn{
background:#ff9900;border:none;
width:90%;margin:5px auto;
display:flex;align-items:center;justify-content:center;
gap:6px;padding:10px;font-weight:bold;
cursor:pointer;border-radius:6px
}
.buy-btn img{height:18px}

/* FOOTER */
footer{
background:#232f3e;color:#fff;
text-align:center;padding:20px;margin-top:20px
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<span>Koloonline</span>
</header>

<div class="hero">
<img src="logo.png"><br><br>
<h2>Your Global Connection 🌍</h2>
<button onclick="scrollToProducts()" class="buy-btn" style="width:auto">
<img src="logo.png"> Shop Now
</button>
</div>

<div class="navbar">
<input type="text" id="searchInput" placeholder="Search..." oninput="smartSuggest()">
<div id="suggestions"></div>
<button>Cart 🛒 (<span id="cartCount">0</span>)</button>
</div>

<!-- إعلان فوق المنتجات -->
<div style="text-align:center;margin:20px;">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-1294940976431468"
data-ad-slot="1614162350"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="filters">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('electronics')">الكترونيات</button>
<button onclick="filterCategory('wearables')">ساعات</button>
</div>

<div id="products" class="products"></div>

<!-- إعلان تحت المنتجات -->
<div style="text-align:center;margin:20px;">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-1294940976431468"
data-ad-slot="5949126633"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<footer>
<img src="logo.png" style="height:30px"><br>
<p>© 2026 Koloonline</p>
</footer>

<script>
// fallback products
let products=[
{
title:"Echo Dot 5",
asin:"B09B8Q3YHJ",
price:39.99,
category:"electronics",
image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg"
},
{
title:"Smart Watch Pro",
asin:"B09V7Z4TJG",
price:49.99,
category:"wearables",
image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"
}
];

// API
async function loadProducts(){
try{
let res=await fetch("/api/products");
let data=await res.json();
products=data.products;
}catch(e){
console.log("fallback products loaded");
}
displayProducts(products);
}
loadProducts();

// affiliate link
function buildLink(asin){
return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

// display
function displayProducts(list){
let html="";
list.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>$${p.price}</p>
<p>⭐ 4.5 (1200 reviews) 🔥 Limited Offer</p>
</div>
<button class="buy-btn" onclick='addToCart(${JSON.stringify(p)})'>
<img src="logo.png"> Add
</button>
<button class="buy-btn" onclick='goToProduct("${p.asin}")'>
🔥 Buy
</button>
</div>
`;
});
document.getElementById("products").innerHTML=html;
}

// search
function smartSuggest(){
let q=document.getElementById("searchInput").value.toLowerCase();
let results=products.filter(p=>p.title.toLowerCase().includes(q));
displayProducts(results);
let sug="";
results.slice(0,5).forEach(p=>{
sug+=`<div onclick="selectProduct('${p.title}')" style="padding:8px;cursor:pointer">${p.title}</div>`;
});
document.getElementById("suggestions").innerHTML=sug;
}
function selectProduct(t){
document.getElementById("searchInput").value=t;
document.getElementById("suggestions").innerHTML="";
smartSuggest();
}

// filter
function filterCategory(cat){
if(cat==="all"){displayProducts(products);return;}
displayProducts(products.filter(p=>p.category===cat));
}

// cart
let cart=JSON.parse(localStorage.getItem("cart"))||[];
function addToCart(p){
cart.push(p);
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}
function updateCart(){
document.getElementById("cartCount").innerText=cart.length;
}
updateCart();

// tracking clicks
function trackClick(p){
let clicks=JSON.parse(localStorage.getItem("clicks")||"{}");
clicks[p.asin]=(clicks[p.asin]||0)+1;
localStorage.setItem("clicks",JSON.stringify(clicks));
}

// go to product page
function goToProduct(asin){
window.location.href = "/product.html?asin=" + asin;
}

// scroll
function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
