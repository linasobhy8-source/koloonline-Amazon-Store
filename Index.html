<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store - Best Amazon Deals</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Best Amazon deals, smart watches, gadgets and trending products with fast access and exclusive offers.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.koloonline.online/">

<!-- Favicon -->
<link rel="icon" href="favicon.ico">

<!-- ================= Google Tag Manager ================= -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8KBN"></script>

<!-- ================= Google Analytics ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');
</script>

<!-- ================= CSS ================= -->
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #232f3e;
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

.navbar {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #37475a;
  flex-wrap: wrap;
}

.navbar input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

.navbar button {
  background: #ff9900;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: contain;
}

.price {
  color: #b12704;
  font-weight: bold;
}

.buy-btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

.amazon {
  background: #ff9900;
}

.cod {
  background: #25d366;
  color: white;
}

#suggestBox {
  position: absolute;
  background: white;
  width: 60%;
  display: none;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>🔥 Koloonline Store</header>

<div class="navbar">
  <input type="text" id="searchInput" placeholder="Search products...">
  <button>Search</button>
</div>

<div id="suggestBox"></div>

<div class="products" id="productGrid"></div>

<script>

/* ================= PRODUCTS ================= */
let productsData = [
{
title:"Smart Watch Pro",
price:"$49.99",
img:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",
asin:"B09V7Z4TJG"
},
{
title:"Echo Dot 5",
price:"$39.99",
img:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",
asin:"B09B8Q3YHJ"
}
];

/* ================= BUILD LINK ================= */
function getLink(asin){
return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

/* ================= TRACK ================= */
function track(type, label){
if(typeof gtag !== "undefined"){
gtag('event', type, {
event_category: 'affiliate',
event_label: label
});
}
}

/* ================= BUY ================= */
function buy(url){
track("buy_click", url);
window.open(url, "_blank");
}

/* ================= RENDER ================= */
function render(data){
const grid = document.getElementById("productGrid");
grid.innerHTML = "";

data.forEach(p=>{
grid.innerHTML += `
<div class="card">
<img src="${p.img}">
<h3>${p.title}</h3>
<p class="price">${p.price}</p>

<button class="buy-btn amazon" onclick="buy('${getLink(p.asin)}')">
🛒 Buy from Amazon
</button>

<button class="buy-btn cod" onclick="location.href='https://shop.koloonline.online'">
📦 Order Cash
</button>
</div>
`;
});
}

/* ================= SEARCH ================= */
const input = document.getElementById("searchInput");
const suggest = document.getElementById("suggestBox");

input.addEventListener("input", ()=>{
let value = input.value.toLowerCase();

if(!value){
render(productsData);
suggest.style.display="none";
return;
}

let filtered = productsData.filter(p =>
p.title.toLowerCase().includes(value)
);

render(filtered);

suggest.innerHTML="";
filtered.forEach(p=>{
let div = document.createElement("div");
div.innerText = p.title;
div.onclick=()=>{
input.value=p.title;
render([p]);
suggest.style.display="none";
};
suggest.appendChild(div);
});

suggest.style.display="block";
});

/* ================= INIT ================= */
render(productsData);

</script>

</body>
</html>
