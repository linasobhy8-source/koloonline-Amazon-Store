<script>

// products
const products = [
{
title:"Smart Watch Pro",
asin:"B09V7Z4TJG",
price:"$49.99",
image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"
},
{
title:"Wireless Earbuds",
asin:"B08J5F3G18",
price:"$39.99",
image:"https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg"
}
];

// cart
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function updateCartCount(){
document.getElementById("cart-count").innerText = cart.length;
}

// add to cart
function addToCart(p){
cart.push(p);
localStorage.setItem("cart", JSON.stringify(cart));
updateCartCount();
}

// affiliate
function buildLink(asin){
return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

// tracking
function trackClick(asin){
let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");
clicks[asin] = (clicks[asin] || 0) + 1;
localStorage.setItem("clicks", JSON.stringify(clicks));
}

// buy
function buyNow(asin){
trackClick(asin);
window.open(buildLink(asin));
}

// WhatsApp
function orderWhatsApp(product){
let phone="201XXXXXXXXX";
let msg=`Order: ${product}`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// render
function loadProduct(){
document.getElementById("product").innerHTML = products.map(p=>`
<div class="card">

<img src="${p.image}" style="width:100%;height:200px;object-fit:contain">

<h3>${p.title}</h3>
<p>${p.price}</p>

<button class="buy-btn" onclick='addToCart(${JSON.stringify(p)})'>🛒 Add</button>

<button class="buy-btn" onclick="buyNow('${p.asin}')">🔥 Buy</button>

<button class="buy-btn" onclick="orderWhatsApp('${p.title}')">📲 WhatsApp</button>

</div>
`).join("");
}

loadProduct();
updateCartCount();

</script>
