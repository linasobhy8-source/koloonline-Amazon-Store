<body>

<header>🔥 Koloonline Smart Deals 2026</header>

<div class="navbar">
  🛒 Cart: <span id="cart-count">0</span>

<!-- SEO -->
<section style="padding:20px;max-width:900px;margin:auto;">
  <h1>Top Trending Smart Products 2026</h1>
  <p>Best Amazon gadgets with real tracking + SaaS analytics system.</p>
</section>

<div id="product" class="products"></div>

<footer>
  <p>© 2026 Koloonline SaaS</p>
</footer>

<script>
/* ================= PRODUCTS ================= */
const products = [
  {
    title:"Smart Watch Pro",
    asin:"B09V7Z4TJG",
    price:"$49.99",
    image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"
  },
  {
    title:"Wireless Earbuds",
    asin:"B08J5F3G18",
    price:"$39.99",
    image:"https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg"
  }
];

/* ================= CART ================= */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");
function updateCart(){document.getElementById("cart-count").innerText = cart.length;}

/* ================= SAAS TRACKING ================= */
async function trackEvent(eventType, data){
  try{
    await fetch("https://koloonline-store-git-main-linasobhys-projects.vercel.app/api/track",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        event: eventType,
        data: data,
        page: "product",
        timestamp: new Date().toISOString(),
        lang: navigator.language
      })
    });
  }catch(e){console.log("tracking skipped");}
}

/* ================= ACTIONS ================= */
function addToCart(product){
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
  trackEvent("add_to_cart", product.asin);
}

function buyNow(asin){
  trackEvent("amazon_click", asin);
  let link = `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
  window.open(link, "_blank");
}

function orderWhatsApp(product){
  trackEvent("whatsapp_click", product);
  let phone = "XXXXXXXXXXX"; // 👈 ضع رقمك هنا
  let msg = `Order request: ${product}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

/* ================= RENDER ================= */
function render(){
  document.getElementById("product").innerHTML = products.map(p=>`
    <div class="card">
      <img src="${p.image}" style="width:100%;height:200px;object-fit:contain">
      <h3>${p.title}</h3>
      <p>${p.price}</p>
      <button class="btn" onclick='addToCart(${JSON.stringify(p)})'>🛒 Add to Cart</button>
      <button class="btn" onclick="buyNow('${p.asin}')">🔥 Buy Now</button>
      <button class="btn" onclick="orderWhatsApp('${p.title}')">📲 WhatsApp</button>
    </div>
  `).join("");
}

render();
updateCart();
</script>
