body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#232f3e;color:#fff;padding:15px;text-align:center;font-size:22px;}

<body>

<header>🛒 Your Cart</header>

<div class="navbar">

<button onclick="location.href='index.html'">🏠 Home</button>
<button onclick="location.href='dashboard.html'">📊 Dashboard</button>

</div>

<div id="cart" class="products"></div>
<div id="summary" style="padding:20px;"></div>

<script>

/* ================= CART ================= */
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* ================= TRACKING ================= */
async function trackEvent(eventType, data){

try{
await fetch("https://koloonline-store-git-main-linasobhys-projects.vercel.app/api/track",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
event: eventType,
data: data,
page: "cart",
timestamp: new Date().toISOString(),
lang: navigator.language
})
});
}catch(e){
console.log("track failed");
}

}

/* ================= SAVE ================= */
function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

/* ================= RENDER ================= */
function renderCart(){

let container = document.getElementById("cart");
let summary = document.getElementById("summary");

trackEvent("page_view", "cart_page");

if(cart.length === 0){
container.innerHTML = "<div style='text-align:center;padding:50px'>🛒 Cart is empty</div>";
summary.innerHTML = "";
return;
}

let html = "";
let totalItems = 0;
let totalPrice = 0;

cart.forEach((item,index)=>{

if(!item.qty) item.qty = 1;

totalItems += item.qty;
totalPrice += (parseFloat(item.price) || 0) * item.qty;

html += `
<div class="card">

<img src="${item.image}" style="width:100%;height:180px;object-fit:contain">

<h3>${item.title}</h3>
<p>💰 $${item.price}</p>
<p>Qty: ${item.qty}</p>

<button class="buy-btn" onclick="increaseQty(${index})">➕</button>
<button class="buy-btn" onclick="decreaseQty(${index})">➖</button>
<button class="buy-btn" style="background:#d9534f" onclick="removeItem(${index})">❌ Remove</button>

</div>
`;
});

container.innerHTML = html;

summary.innerHTML = `
<div class="card">

<h3>🛒 Items: ${totalItems}</h3>
<h3>💰 Total: $${totalPrice.toFixed(2)}</h3>

<button class="buy-btn" onclick="checkout()">🚀 Checkout</button>
<button class="buy-btn" style="background:#d9534f" onclick="clearCart()">🗑 Clear</button>

</div>
`;

}

/* ================= ACTIONS ================= */
function removeItem(index){

trackEvent("remove_item", cart[index].asin || cart[index].title);

cart.splice(index,1);
saveCart();

}

function increaseQty(index){

cart[index].qty = (cart[index].qty || 1) + 1;

trackEvent("qty_increase", cart[index].asin || cart[index].title);

saveCart();

}

function decreaseQty(index){

if(cart[index].qty > 1){
cart[index].qty -= 1;
trackEvent("qty_decrease", cart[index].asin || cart[index].title);
}else{
trackEvent("remove_item", cart[index].asin || cart[index].title);
cart.splice(index,1);
}

saveCart();

}

function clearCart(){

if(confirm("Clear cart?")){
trackEvent("clear_cart", "all_items");
cart = [];
saveCart();
}

}

/* ================= CHECKOUT ================= */
function checkout(){

if(cart.length === 0){
alert("Cart is empty");
return;
}

trackEvent("checkout_start", {
items: cart.length,
total: cart.reduce((sum,i)=>sum + (parseFloat(i.price)||0)*(i.qty||1),0)
});

localStorage.setItem("lastOrder", JSON.stringify(cart));

trackEvent("order_created", cart);

cart = [];
saveCart();

window.location.href = "thankyou.html";
