<style>
body{

  max-width:700px;

<!-- GTM NOSCRIPT -->

<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNQM8KBN"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>🛒 Cart | Koloonline</header>

<!-- ================= NAVBAR (FIXED LINKS) ================= -->
<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/product">📦 Products</a>
  <a href="/cart">🛒 Cart</a>
  <a href="/blog">📰 Blog</a>
  <a href="/contact">✉️ Contact</a>
  <a href="/dashboard">📊 Dashboard</a>
</div>

<!-- ================= CART ================= -->
<div class="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <button onclick="checkout()">Checkout</button>
</div>

<script>

/* ================= TRACK ================= */
function trackEvent(name,data={}){
  if(typeof gtag==="function"){
    gtag('event',name,data);
  }
  console.log(name,data);
}

/* ================= LOAD CART ================= */
function loadCart(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const box = document.getElementById("cartItems");

  box.innerHTML="";

  if(cart.length===0){
    box.innerHTML="<p>Cart is empty</p>";
    return;
  }

  cart.forEach(item=>{
    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <span>${item.title}</span>
      <span>$${item.price}</span>
    `;

    box.appendChild(div);
  });
}

/* ================= CHECKOUT ================= */
function checkout(){
  trackEvent("checkout_click",{page:"cart"});
  alert("Redirecting to Amazon...");
}

trackEvent("page_view",{page:"cart"});
loadCart();

</script>
