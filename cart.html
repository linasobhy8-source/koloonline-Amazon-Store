<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
</head>

<body>

<h1>Your Cart 🛒</h1>

<div id="cart"></div>

<h2 id="total"></h2>

<script>
function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let container = document.getElementById("cart");
  let total = 0;

  cart.forEach(p => {
    total += p.price;

    container.innerHTML += `
      <div>
        <img src="${p.image}" width="100"/>
        <h3>${p.title}</h3>
        <p>$${p.price}</p>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: $" + total;
}

loadCart();
</script>

</body>
</html>
