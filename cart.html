<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Your Cart 🛒</header>

<div id="cart"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
  let html = "";

  cart.forEach(item=>{
    html += `
      <div class="card">
        <img src="${item.image}">
        <h3>${item.title}</h3>
        <p>$${item.price}</p>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
}

renderCart();
</script>

</body>
</html>
