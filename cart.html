<h1>Your Cart 🛒</h1>

<div id="cart"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
  const container = document.getElementById("cart");

  container.innerHTML = cart.map(p => `
    <div>
      <h3>${p.title}</h3>
      <p>$${p.price}</p>
    </div>
  `).join("");
}

renderCart();
</script>
