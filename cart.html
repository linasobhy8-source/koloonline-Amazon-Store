<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Your Cart 🛒</header>

<!-- NAV BAR -->
<div class="navbar">

  <button onclick="location.href='index.html'">
    🏠 Home
  </button>

  <button onclick="location.href='dashboard.html'">
    📊 Dashboard
  </button>

</div>

<!-- CART CONTAINER -->
<div id="cart" class="products"></div>

<!-- SUMMARY -->
<div id="summary" style="padding:20px;"></div>

<script>

// ================= GET CART =================
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

// ================= SAFE SAVE =================
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// ================= RENDER CART =================
function renderCart(){

  let container = document.getElementById("cart");
  let summary = document.getElementById("summary");

  if(cart.length === 0){
    container.innerHTML = `
      <div style="text-align:center;padding:50px;font-size:18px;">
        🛒 Your cart is empty
      </div>
    `;
    summary.innerHTML = "";
    return;
  }

  let html = "";
  let totalItems = 0;
  let totalPrice = 0;

  cart.forEach((item, index)=>{

    // حماية من null qty
    if(!item.qty) item.qty = 1;

    totalItems += item.qty;
    totalPrice += (parseFloat(item.price) || 0) * item.qty;

    html += `
      <div class="card">

        <img src="${item.image}" alt="${item.title}">

        <div class="card-content">
          <h3>${item.title}</h3>
          <p>$${item.price}</p>
          <p>Qty: ${item.qty}</p>
        </div>

        <button class="buy-btn" onclick="increaseQty(${index})">
          ➕
        </button>

        <button class="buy-btn" onclick="decreaseQty(${index})">
          ➖
        </button>

        <button class="buy-btn" onclick="removeItem(${index})" style="background:#d9534f;">
          ❌ Remove
        </button>

      </div>
    `;
  });

  container.innerHTML = html;

  // summary
  summary.innerHTML = `
    <div class="card" style="padding:20px;">

      <h3>🛒 Total Items: ${totalItems}</h3>
      <h3>💰 Total Price: $${totalPrice.toFixed(2)}</h3>

      <button class="buy-btn" onclick="checkout()" style="margin-top:10px;">
        🚀 Checkout Now
      </button>

      <button class="buy-btn" onclick="clearCart()" style="background:#d9534f;margin-top:10px;">
        🗑 Clear Cart
      </button>

    </div>
  `;
}

// ================= REMOVE ITEM =================
function removeItem(index){
  cart.splice(index, 1);
  saveCart();
}

// ================= INCREASE =================
function increaseQty(index){
  cart[index].qty = (cart[index].qty || 1) + 1;
  saveCart();
}

// ================= DECREASE =================
function decreaseQty(index){
  if(cart[index].qty > 1){
    cart[index].qty -= 1;
  }else{
    cart.splice(index,1);
  }
  saveCart();
}

// ================= CLEAR CART =================
function clearCart(){
  if(confirm("Clear all items?")){
    cart = [];
    saveCart();
  }
}

// ================= CHECKOUT =================
function checkout(){

  if(cart.length === 0){
    alert("Cart is empty 🛒");
    return;
  }

  // حفظ بسيط قبل التحويل
  localStorage.setItem("lastOrder", JSON.stringify(cart));

  // تنظيف الكارت
  cart = [];
  saveCart();

  // تحويل لصفحة الشكر (مهم للربح)
  window.location.href = "thankyou.html";
}

// ================= INIT =================
renderCart();

</script>

</body>
</html>
