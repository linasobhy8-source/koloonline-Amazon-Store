<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ================= SEO BASIC ================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | Koloonline Store</title>
  <meta name="description" content="Koloonline Amazon Store - اتصل بنا لأي استفسارات حول منتجاتنا وعروض Amazon الحصرية.">
  <meta name="keywords" content="Contact Koloonline, Amazon Affiliate Store, Customer Support, Smart Shopping">
  <meta name="author" content="Koloonline - Lina Sobhy">

  <!-- ================= FAVICON ================= -->
  <link rel="icon" type="image/png" href="assets/1000276862.png">
  <link rel="shortcut icon" href="assets/1000276862.png">
  <link rel="apple-touch-icon" href="assets/1000276862.png">

  <!-- ================= STYLES ================= -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #232f3e;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      background: #ff9900;
      color: #fff;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #e68a00;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
      color: #28a745;
      text-align: center;
    }
    /* AdSense Container */
    .ad-container {
      margin: 30px 0;
      text-align: center;
    }
  </style>

  <!-- ================= DYNAMIC ADSENSE LOADER ================= -->
  <script>
    function loadAd(containerId, adClient, adSlot) {
      const container = document.getElementById(containerId);
      if (!container) return;

      const script = document.createElement('script');
      script.async = true;
      script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${adClient}`;
      script.crossOrigin = "anonymous";
      container.appendChild(script);

      const ins = document.createElement('ins');
      ins.className = 'adsbygoogle';
      ins.style.display = 'block';
      ins.setAttribute('data-ad-client', adClient);
      ins.setAttribute('data-ad-slot', adSlot);
      ins.setAttribute('data-ad-format', 'auto');
      ins.setAttribute('data-full-width-responsive', 'true');
      container.appendChild(ins);

      (adsbygoogle = window.adsbygoogle || []).push({});
    }
  </script>

</head>
<body>

<div class="container">

  <div class="card">

    <h1>Contact Us</h1>
    <p style="text-align:center;">If you have any questions, feel free to contact us.</p>

    <form onsubmit="sendMessage(event)">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <p id="status"></p>

    <!-- ================= ADSENSE PLACEHOLDER ================= -->
    <div id="top-ad" class="ad-container"></div>

  </div>
</div>

<script>
  // ================= DYNAMIC CONTACT FORM =================
  function sendMessage(e){
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if(!name || !email || !message){
      document.getElementById("status").innerText = "⚠️ Please fill in all fields!";
      return;
    }

    // يمكن هنا إضافة API حقيقي لإرسال الرسائل
    console.log({name, email, message});

    document.getElementById("status").innerText =
      "✅ Your message has been sent successfully!";

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";
  }

  // ================= LOAD ADSENSE DYNAMICALLY =================
  loadAd("top-ad", "ca-pub-1294940976431468", "1614162350");
</script>

</body>
</html>
