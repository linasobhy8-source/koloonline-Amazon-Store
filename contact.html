<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Koloonline Store</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.container{max-width:600px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:10px;margin-top:40px}
input,textarea{
width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:6px
}
button{
background:#111;color:white;padding:10px;border:none;width:100%;
border-radius:6px;cursor:pointer
}
</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>Contact Us</h1>

<p>If you have any questions, feel free to contact us.</p>

<form onsubmit="sendMessage(event)">

<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" placeholder="Your Message" rows="5" required></textarea>

<button type="submit">Send Message</button>

</form>

<p id="status"></p>

</div>

</div>

<script>

function sendMessage(e){
e.preventDefault();

document.getElementById("status").innerText =
"✅ Your message has been sent successfully!";

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("message").value="";
}

</script>

</body>
</html>
