<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard V2 | Koloonline SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#0f172a;
color:#fff;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

h3{margin-top:0;color:#facc15}

canvas{background:#111827;border-radius:10px;padding:10px}

.small{
font-size:14px;color:#9ca3af;
}
</style>
</head>

<body>

<header>🔥 Koloonline Dashboard V2 (SaaS Analytics)</header>

<div class="container">

<!-- ================= SUMMARY ================= -->
<div class="card">
<h3>📊 Summary</h3>
<p class="small" id="summary"></p>
</div>

<!-- ================= FUNNEL ================= -->
<div class="card">
<h3>🎯 Conversion Funnel</h3>
<canvas id="funnelChart"></canvas>
</div>

<!-- ================= PRODUCTS ================= -->
<div class="card">
<h3>📦 Top Products</h3>
<canvas id="productChart"></canvas>
</div>

<!-- ================= COUNTRIES ================= -->
<div class="card">
<h3>🌍 Countries</h3>
<canvas id="countryChart"></canvas>
</div>

</div>

<script>

/* ================= LOAD DATA ================= */
let data = JSON.parse(localStorage.getItem("analytics") || "{}");

/* ================= AGGREGATION ================= */
let totalClick=0;
let totalCart=0;
let totalWhats=0;

let productLabels=[];
let clickData=[];

let countryMap={};

for(let asin in data){

let p = data[asin];

totalClick += p.click || 0;
totalCart += p.cart || 0;
totalWhats += p.whatsapp || 0;

// products
productLabels.push(asin);
clickData.push(p.click || 0);

// countries
if(p.country){
for(let c in p.country){
countryMap[c] = (countryMap[c]||0)+p.country[c];
}
}
}

/* ================= SUMMARY ================= */
document.getElementById("summary").innerHTML = `
Clicks: ${totalClick}<br>
Add to Cart: ${totalCart}<br>
WhatsApp Orders: ${totalWhats}<br>
Conversion Rate: ${totalClick ? ((totalWhats/totalClick)*100).toFixed(2) : 0}%
`;

/* ================= FUNNEL ================= */
new Chart(document.getElementById("funnelChart"),{
type:'bar',
data:{
labels:["Clicks","Cart","WhatsApp"],
datasets:[{
label:"Funnel",
data:[totalClick,totalCart,totalWhats],
backgroundColor:["#3b82f6","#f59e0b","#10b981"]
}]
}
});

/* ================= PRODUCTS ================= */
new Chart(document.getElementById("productChart"),{
type:'bar',
data:{
labels:productLabels,
datasets:[{
label:"Clicks per Product",
data:clickData,
backgroundColor:"#facc15"
}]
}
});

/* ================= COUNTRIES ================= */
new Chart(document.getElementById("countryChart"),{
type:'pie',
data:{
labels:Object.keys(countryMap),
datasets:[{
data:Object.values(countryMap),
backgroundColor:[
"#ef4444","#3b82f6","#22c55e","#eab308","#a855f7"
]
}]
}
});

</script>

</body>
</html>
