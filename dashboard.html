<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

h1 {
  text-align:center;
}

.nav {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.nav button {
  padding:10px;
  border:none;
  background:#000;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

.card {
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.top {
  background:#ffeeba;
}

canvas {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>

</head>

<body>

<h1>💰 Koloonline Dashboard Pro</h1>

<div class="nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="resetData()">🗑 Reset Data</button>
</div>

<h2>📊 Overview</h2>
<div id="overview"></div>

<h2>📈 Clicks per Product</h2>
<canvas id="clickChart"></canvas>

<h2>📅 Daily Clicks</h2>
<canvas id="dailyChart"></canvas>

<h2>🔥 Top Products</h2>
<div id="topProducts"></div>

<script>

// ================= LOAD DATA =================
let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");
let dailyClicks = JSON.parse(localStorage.getItem("dailyClicks") || "{}");

// ================= PRODUCTS MAP =================
const productsMap = {
  B09B8Q3YHJ: "Echo Dot 5",
  B09V7Z4TJG: "Smart Watch Pro",
  B08J5F3G18: "Wireless Earbuds"
};

// ================= SAFE SUM =================
function getTotalClicks(){
  return Object.values(clicks).reduce((a,b)=> a + b, 0);
}

// ================= OVERVIEW =================
function renderOverview(){

  let totalClicks = getTotalClicks();

  // تقدير أرباح (قابل للتعديل لاحقًا)
  let estimatedRevenue = (totalClicks * 0.05).toFixed(2);

  document.getElementById("overview").innerHTML = `
    <div class="card">
      <h3>🔥 Total Clicks: ${totalClicks}</h3>
      <h3>💰 Estimated Earnings: $${estimatedRevenue}</h3>
      <h3>📦 Products Tracked: ${Object.keys(clicks).length}</h3>
    </div>
  `;
}

// ================= CLICK CHART =================
let clickChartInstance = null;

function renderChart(){

  let labels = [];
  let data = [];

  for(let asin in clicks){
    labels.push(productsMap[asin] || asin);
    data.push(clicks[asin]);
  }

  if(labels.length === 0){
    labels = ["No Data"];
    data = [0];
  }

  if(clickChartInstance){
    clickChartInstance.destroy();
  }

  clickChartInstance = new Chart(document.getElementById("clickChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Product Clicks",
        data,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

// ================= DAILY CHART =================
let dailyChartInstance = null;

function renderDailyChart(){

  let labels = Object.keys(dailyClicks);
  let data = Object.values(dailyClicks);

  if(labels.length === 0){
    labels = ["No Data"];
    data = [0];
  }

  if(dailyChartInstance){
    dailyChartInstance.destroy();
  }

  dailyChartInstance = new Chart(document.getElementById("dailyChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Daily Clicks",
        data,
        tension: 0.3
      }]
    }
  });
}

// ================= TOP PRODUCTS =================
function renderTopProducts(){

  let arr = Object.entries(clicks);

  arr.sort((a,b)=> b[1] - a[1]);

  let html = "";

  arr.forEach(([asin, count], index)=>{

    html += `
      <div class="card ${index===0 ? 'top' : ''}">
        <h3>🏆 ${productsMap[asin] || asin}</h3>
        <p>🔥 Clicks: ${count}</p>
      </div>
    `;
  });

  if(arr.length === 0){
    html = "<p>No tracking data yet 😎</p>";
  }

  document.getElementById("topProducts").innerHTML = html;
}

// ================= RESET DATA =================
function resetData(){
  if(confirm("Reset all analytics data?")){
    localStorage.removeItem("clicks");
    localStorage.removeItem("dailyClicks");
    location.reload();
  }
}

// ================= INIT =================
renderOverview();
renderChart();
renderDailyChart();
renderTopProducts();

</script>

</body>
</html>
