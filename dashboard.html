<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard V3 | Koloonline SaaS Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#0b1220;
color:#fff;
}

header{
background:#111827;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

h3{margin-top:0;color:#facc15}

canvas{
background:#111827;
border-radius:10px;
padding:10px;
}

.small{
font-size:14px;
color:#9ca3af;
}

.kpi{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.kpi div{
background:#111827;
padding:10px;
border-radius:10px;
flex:1;
text-align:center;
}
</style>

</head>

<body>

<header>🔥 Koloonline Dashboard V3 (Advanced Analytics)</header>

<div class="container">

<!-- ================= SUMMARY ================= -->
<div class="card">
<h3>📊 Summary</h3>
<div class="kpi" id="summary"></div>
</div>

<!-- ================= FUNNEL ================= -->
<div class="card">
<h3>🎯 Conversion Funnel</h3>
<canvas id="funnelChart"></canvas>
</div>

<!-- ================= PRODUCTS ================= -->
<div class="card">
<h3>📦 Top Products</h3>
<canvas id="productChart"></canvas>
</div>

<!-- ================= COUNTRIES ================= -->
<div class="card">
<h3>🌍 Countries</h3>
<canvas id="countryChart"></canvas>
</div>

</div>

<script>

/* ================= SAFE LOAD ================= */
let data = JSON.parse(localStorage.getItem("analytics") || "{}");

/* ================= DEFAULT VALUES ================= */
let totalClick = 0;
let totalCart = 0;
let totalWhats = 0;

let productLabels = [];
let clickData = [];

let countryMap = {};

/* ================= PROCESS DATA ================= */
for(let key in data){

let p = data[key] || {};

totalClick += p.click || 0;
totalCart += p.cart || 0;
totalWhats += p.whatsapp || 0;

productLabels.push(key);
clickData.push(p.click || 0);

// countries safe check
if(p.country && typeof p.country === "object"){
for(let c in p.country){
countryMap[c] = (countryMap[c] || 0) + p.country[c];
}
}

}

/* ================= SUMMARY UI ================= */
const conversion = totalClick ? ((totalWhats / totalClick) * 100).toFixed(2) : 0;

document.getElementById("summary").innerHTML = `
<div>👆 Clicks: <b>${totalClick}</b></div>
<div>🛒 Cart: <b>${totalCart}</b></div>
<div>💬 Orders: <b>${totalWhats}</b></div>
<div>📈 Conv: <b>${conversion}%</b></div>
`;

/* ================= FUNNEL ================= */
new Chart(document.getElementById("funnelChart"),{
type:'bar',
data:{
labels:["Clicks","Cart","Orders"],
datasets:[{
label:"Conversion Funnel",
data:[totalClick,totalCart,totalWhats],
backgroundColor:["#3b82f6","#f59e0b","#10b981"]
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
}
}
});

/* ================= PRODUCTS ================= */
new Chart(document.getElementById("productChart"),{
type:'bar',
data:{
labels:productLabels.length ? productLabels : ["No Data"],
datasets:[{
label:"Product Clicks",
data:clickData.length ? clickData : [0],
backgroundColor:"#facc15"
}]
},
options:{
responsive:true
}
});

/* ================= COUNTRIES ================= */
new Chart(document.getElementById("countryChart"),{
type:'pie',
data:{
labels:Object.keys(countryMap).length ? Object.keys(countryMap) : ["No Data"],
datasets:[{
data:Object.values(countryMap).length ? Object.values(countryMap) : [1],
backgroundColor:[
"#ef4444","#3b82f6","#22c55e","#eab308","#a855f7","#06b6d4"
]
}]
},
options:{
responsive:true
}
});

</script>

</body>
  </html>
