<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloonline Analytics Dashboard</title>

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#131921;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.nav{
  display:flex;
  justify-content:center;
  gap:15px;
  background:#232f3e;
  padding:10px;
}

.nav a{
  color:white;
  text-decoration:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h2{
  color:#ff9900;
  font-size:26px;
}

table{
  width:95%;
  margin:20px auto;
  background:white;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#232f3e;
  color:white;
}
</style>
</head>

<body>

<header>📊 Koloonline Analytics</header>

<nav class="nav">
  <a href="/">Store</a>
  <a href="/dashboard">Dashboard</a>
</nav>

<!-- ================= STATS ================= -->
<div class="grid">
  <div class="card">
    <p>Clicks</p>
    <h2 id="clicks">0</h2>
  </div>

  <div class="card">
    <p>Orders</p>
    <h2 id="orders">0</h2>
  </div>

  <div class="card">
    <p>WhatsApp</p>
    <h2 id="whatsapp">0</h2>
  </div>

  <div class="card">
    <p>Revenue</p>
    <h2 id="revenue">$0</h2>
  </div>
</div>

<!-- ================= TABLE ================= -->
<table>
  <thead>
    <tr>
      <th>ASIN</th>
      <th>Clicks</th>
      <th>Orders</th>
      <th>WhatsApp</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>

function getCountry(){
  const lang = navigator.language || "en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("en-CA")) return "CA";
  if(lang.includes("pl")) return "PL";
  return "US";
}

/* ================= TRACK VIEW ================= */
gtag('event','dashboard_view',{
  country:getCountry()
});

/* ================= LOAD DATA ================= */
async function loadAnalytics(){

  try{
    const res = await fetch("/api/analytics");

    if(!res.ok){
      console.log("API not ready");
      return;
    }

    const data = await res.json();

    const clicks = data?.overview?.totalClicks || 0;
    const orders = data?.overview?.totalOrders || 0;
    const whatsapp = data?.overview?.totalWhatsApp || 0;

    document.getElementById("clicks").innerText = clicks;
    document.getElementById("orders").innerText = orders;
    document.getElementById("whatsapp").innerText = whatsapp;

    document.getElementById("revenue").innerText = "$" + (orders * 12);

    const table = document.getElementById("table");
    table.innerHTML = "";

    (data?.topProducts || []).forEach(p=>{
      table.innerHTML += `
        <tr onclick="trackProduct('${p.asin}')">
          <td>${p.asin}</td>
          <td>${p.clicks}</td>
          <td>${p.orders}</td>
          <td>${p.whatsapp}</td>
        </tr>
      `;
    });

  }catch(err){
    console.log("Dashboard error:", err);
  }
}

/* ================= TRACK CLICK ================= */
function trackProduct(asin){
  gtag('event','affiliate_click',{
    asin:asin,
    source:'dashboard'
  });
}

/* ================= AUTO REFRESH ================= */
setInterval(loadAnalytics, 10000);
loadAnalytics();

</script>

</body>
</html>
