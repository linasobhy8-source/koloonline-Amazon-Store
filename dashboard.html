<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Koloonline</title>
<link rel="icon" href="favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
header{background:#232f3e;color:#fff;padding:15px;font-size:22px;font-weight:bold;text-align:center;}
.navbar{display:flex;justify-content:space-between;padding:10px;background:#37475a;color:#fff;flex-wrap:wrap;}
.navbar button{background:#ff9900;border:none;padding:8px 12px;border-radius:6px;font-weight:bold;cursor:pointer;margin-left:5px;transition:0.2s;}
.navbar button:hover{background:#e68a00;}
.section{background:#fff;margin:20px auto;padding:20px;border-radius:10px;max-width:900px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
h2{margin-top:0;}
.stats{display:flex;justify-content:space-around;flex-wrap:wrap;}
.stat-card{background:#e8f5e9;padding:15px;margin:10px;border-radius:8px;text-align:center;flex:1;min-width:120px;}
.stat-card h3{margin:5px 0;}
.table{width:100%;border-collapse:collapse;margin-top:15px;}
.table th,.table td{border:1px solid #ccc;padding:8px;text-align:center;}
.table th{background:#37475a;color:#fff;}
canvas{max-width:100%;margin:20px auto;display:block;}
</style>

</head>
<body>

<header>📊 Koloonline Dashboard</header>

<div class="navbar">
  <div>
    <button onclick="location.href='index.html'">🏠 Home</button>
  </div>
</div>

<!-- ================= STATS ================= -->
<div class="section">
  <h2>Overall Stats</h2>
  <div class="stats">
    <div class="stat-card">
      <h3 id="clicks">0</h3>
      <p>Clicks</p>
    </div>
    <div class="stat-card">
      <h3 id="carts">0</h3>
      <p>Orders</p>
    </div>
    <div class="stat-card">
      <h3 id="whatsapp">0</h3>
      <p>WhatsApp Orders</p>
    </div>
    <div class="stat-card">
      <h3 id="conversion">0%</h3>
      <p>Conversion Rate</p>
    </div>
  </div>
</div>

<!-- ================= CHARTS ================= -->
<div class="section">
  <h2>Traffic Overview</h2>
  <canvas id="trafficChart"></canvas>

  <h2>Country Distribution</h2>
  <canvas id="countryChart"></canvas>

  <h2>Top Products Performance</h2>
  <canvas id="productPerformanceChart"></canvas>

  <h2>Conversion Funnel</h2>
  <canvas id="conversionFunnelChart"></canvas>
</div>

<!-- ================= TOP PRODUCTS TABLE ================= -->
<div class="section">
  <h2>Top Products</h2>
  <table class="table" id="topProductsTable">
    <thead>
      <tr><th>ASIN</th><th>Clicks</th><th>Orders</th><th>WhatsApp Orders</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
async function fetchAnalytics(){
  try {
    const res=await fetch('/api/analytics'); 
    const data=await res.json();
    if(!data.success) throw new Error("Failed to load analytics");

    // ================= UPDATE STATS =================
    document.getElementById("clicks").innerText=data.totals.click;
    document.getElementById("carts").innerText=data.totals.cart;
    document.getElementById("whatsapp").innerText=data.totals.whatsapp;
    document.getElementById("conversion").innerText=data.totals.conversion+"%";

    // ================= TOP PRODUCTS =================
    const tableBody=document.querySelector('#topProductsTable tbody');
    tableBody.innerHTML="";
    data.topProducts.forEach(p=>{
      const row=document.createElement("tr");
      row.innerHTML=`<td>${p.asin}</td><td>${p.clicks}</td><td>${p.orders}</td><td>${p.whatsapp}</td>`;
      tableBody.appendChild(row);
    });

    // ================= CHARTS =================
    const trafficCtx=document.getElementById('trafficChart').getContext('2d');
    new Chart(trafficCtx,{
      type:'line',
      data:{
        labels:data.topProducts.map(p=>p.asin),
        datasets:[
          {label:'Clicks',data:data.topProducts.map(p=>p.clicks),borderColor:'blue',fill:false},
          {label:'Orders',data:data.topProducts.map(p=>p.orders),borderColor:'green',fill:false}
        ]
      }
    });

    const countryCtx=document.getElementById('countryChart').getContext('2d');
    new Chart(countryCtx,{
      type:'bar',
      data:{
        labels:Object.keys(data.countries),
        datasets:[{label:'Clicks',data:Object.values(data.countries),backgroundColor:'orange'}]
      }
    });

    const productCtx=document.getElementById('productPerformanceChart').getContext('2d');
    new Chart(productCtx,{
      type:'bar',
      data:{
        labels:data.topProducts.map(p=>p.asin),
        datasets:[{label:'WhatsApp Orders',data:data.topProducts.map(p=>p.whatsapp),backgroundColor:'green'}]
      }
    });

    const funnelCtx=document.getElementById('conversionFunnelChart').getContext('2d');
    new Chart(funnelCtx,{
      type:'doughnut',
      data:{
        labels:['Clicks','Orders','WhatsApp Orders'],
        datasets:[{
          data:[data.totals.click,data.totals.cart,data.totals.whatsapp],
          backgroundColor:['blue','green','red']
        }]
      }
    });

  } catch(err){
    console.error(err);
  }
}

// ================= INIT =================
fetchAnalytics();

// ================= OPTIONAL: Auto-refresh every 10s =================
// setInterval(fetchAnalytics,10000);
</script>

</body>
</html>
