<script>

let analytics = JSON.parse(localStorage.getItem("analytics") || "{}");

// ================= TOTAL =================
function calcTotals(){

let totalClicks=0;
let totalCart=0;
let totalWhatsapp=0;

for(let asin in analytics){
totalClicks += analytics[asin].click || 0;
totalCart += analytics[asin].cart || 0;
totalWhatsapp += analytics[asin].whatsapp || 0;
}

return {totalClicks,totalCart,totalWhatsapp};
}

// ================= OVERVIEW =================
function renderOverview(){

let {totalClicks,totalCart,totalWhatsapp} = calcTotals();

let conversionRate = totalClicks ? ((totalWhatsapp / totalClicks)*100).toFixed(2) : 0;

let revenue = (totalWhatsapp * 2).toFixed(2); // تقدير

document.getElementById("overview").innerHTML = `
<div class="card">
<h3>🔥 Clicks: ${totalClicks}</h3>
<h3>🛒 Add to Cart: ${totalCart}</h3>
<h3>📲 WhatsApp Orders: ${totalWhatsapp}</h3>
<h3>📊 Conversion Rate: ${conversionRate}%</h3>
<h3>💰 Estimated Revenue: $${revenue}</h3>
</div>
`;
}

// ================= TOP PRODUCTS =================
function renderTopProducts(){

let arr = [];

for(let asin in analytics){
arr.push({
asin,
score: analytics[asin].whatsapp
});
}

arr.sort((a,b)=>b.score-a.score);

let html="";

arr.forEach((p,i)=>{
html+=`
<div class="card ${i===0?"top":""}">
<h3>🏆 ${p.asin}</h3>
<p>Orders: ${p.score}</p>
</div>
`;
});

document.getElementById("topProducts").innerHTML = html;
}

// ================= COUNTRY =================
function renderCountries(){

let countries={};

for(let asin in analytics){
for(let c in analytics[asin].country){
countries[c] = (countries[c]||0)+analytics[asin].country[c];
}
}

let html="<div class='card'><h3>🌍 Top Countries</h3>";

for(let c in countries){
html+=`<p>${c}: ${countries[c]}</p>`;
}

html+="</div>";

document.getElementById("overview").innerHTML += html;
}

// ================= CHART =================
let chart;

function renderChart(){

let labels=[];
let data=[];

for(let asin in analytics){
labels.push(asin);
data.push(analytics[asin].click);
}

if(chart) chart.destroy();

chart = new Chart(document.getElementById("clickChart"),{
type:"bar",
data:{
labels,
datasets:[{label:"Clicks",data}]
}
});
}

// ================= INIT =================
renderOverview();
renderTopProducts();
renderCountries();
renderChart();

                           </script>
