<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Dashboard</title>
<style>
body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
h1 { margin-bottom: 20px; }
.card { background: #1e293b; padding: 20px; border-radius: 12px; margin: 10px; display: inline-block; width: 220px; }
.section { margin-top: 30px; }
table { width: 100%; background: #1e293b; border-radius: 10px; overflow: hidden; }
td, th { padding: 10px; text-align: left; }
th { background: #334155; }
</style>
</head>
<body>

<h1>🔥 Koloonline Dashboard</h1>

<div id="stats"></div>

<div class="section">
  <h2>🏆 Top Products</h2>
  <table id="productsTable"></table>
</div>

<div class="section">
  <h2>🌍 Top Countries</h2>
  <table id="countriesTable"></table>
</div>

<script>
const API = "https://YOUR-API-URL.com"; // 🔴 حطي رابط الـ Server النهائي

async function loadDashboard() {
  const res = await fetch(API + "/stats");
  const data = await res.json();
  if (!data.success) return;

  document.getElementById("stats").innerHTML = `
    <div class="card">👆 Clicks: ${data.totals.clicks}</div>
    <div class="card">🛒 Cart: ${data.totals.cart}</div>
    <div class="card">📲 WhatsApp: ${data.totals.whatsapp}</div>
  `;

  let productsHTML = `<tr><th>ASIN</th><th>Clicks</th><th>Cart</th><th>WhatsApp</th><th>Conversion %</th></tr>`;
  data.topProducts.forEach(p => {
    productsHTML += `<tr>
      <td>${p.asin}</td>
      <td>${p.clicks}</td>
      <td>${p.cart}</td>
      <td>${p.whatsapp}</td>
      <td>${p.conversionRate}%</td>
    </tr>`;
  });
  document.getElementById("productsTable").innerHTML = productsHTML;

  let countriesHTML = `<tr><th>Country</th><th>Visits</th></tr>`;
  for (let c in data.countries) {
    countriesHTML += `<tr><td>${c}</td><td>${data.countries[c]}</td></tr>`;
  }
  document.getElementById("countriesTable").innerHTML = countriesHTML;
}

loadDashboard();
</script>

</body>
</html>
