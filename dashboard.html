<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📊 Koloonline Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#232f3e;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#37475a;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.big{
  font-size:26px;
  font-weight:bold;
}

/* TABLE */
.table{
  margin:20px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

.table table{
  width:100%;
  border-collapse:collapse;
}

.table th, .table td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.table th{
  background:#232f3e;
  color:#fff;
}

/* COUNTRY */
.country{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:20px;
}

.badge{
  background:#ff9900;
  padding:8px 12px;
  border-radius:20px;
  font-weight:bold;
}
</style>

</head>

<body>

<header>📊 Koloonline Dashboard</header>

<div class="navbar">
<button onclick="location.href='index.html'">🏠 Home</button>
<button onclick="loadData()">🔄 Refresh</button>
</div>

<!-- TOTALS -->
<div class="grid">

<div class="card">
<div>Clicks</div>
<div id="clicks" class="big">0</div>
</div>

<div class="card">
<div>Add To Cart</div>
<div id="cart" class="big">0</div>
</div>

<div class="card">
<div>WhatsApp</div>
<div id="whatsapp" class="big">0</div>
</div>

<div class="card">
<div>Orders</div>
<div id="buy" class="big">0</div>
</div>

<div class="card">
<div>Conversion</div>
<div id="conversion" class="big">0%</div>
</div>

</div>

<!-- TOP PRODUCTS -->
<div class="table">
<table>
<thead>
<tr>
<th>ASIN</th>
<th>Clicks</th>
<th>Orders</th>
<th>WhatsApp</th>
</tr>
</thead>

<tbody id="productsTable"></tbody>

</table>
</div>

<!-- COUNTRIES -->
<div class="country" id="countries"></div>

<script>

// 🔥 مهم: حطي رابط السيرفر بتاعك هنا
const API = "https://koloonline-store-git-main-linasobhys-projects.vercel.app";

/* ================= LOAD ================= */
async function loadData(){

try{

let res = await fetch(API + "/stats");
let data = await res.json();

let t = data.totals;

/* ===== totals ===== */
document.getElementById("clicks").innerText = t.clicks;
document.getElementById("cart").innerText = t.cart;
document.getElementById("whatsapp").innerText = t.whatsapp;
document.getElementById("buy").innerText = t.buy;
document.getElementById("conversion").innerText = t.conversion;

/* ===== products ===== */
let table = "";
data.topProducts.forEach(p=>{
table += `
<tr>
<td>${p.asin}</td>
<td>${p.clicks}</td>
<td>${p.buy}</td>
<td>${p.whatsapp}</td>
</tr>
`;
});

document.getElementById("productsTable").innerHTML = table;

/* ===== countries ===== */
let chtml = "";
for(let c in data.countries){
chtml += `<div class="badge">${c}: ${data.countries[c]}</div>`;
}

document.getElementById("countries").innerHTML = chtml;

}catch(e){
console.log("error loading data");
}

}

/* ================= AUTO REFRESH ================= */
setInterval(loadData, 5000);

/* ================= INIT ================= */
loadData();

</script>

</body>
</html>
