<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Koloonline Store | Best Amazon Deals 2026</title>

<meta name="description" content="Best Amazon deals, smart watches, gadgets and trending products.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.ico">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

/* HEADER */
header{
background:#232f3e;color:#fff;padding:12px;
display:flex;align-items:center;justify-content:center;gap:10px;
}
header img{height:40px}

/* HERO */
.hero{text-align:center;background:#fff;padding:25px}
.hero img{height:80px}

/* NAV */
.navbar{
display:flex;justify-content:space-between;
padding:10px;background:#37475a;flex-wrap:wrap;
position:relative
}

.navbar input{
width:45%;padding:8px;border:none;border-radius:4px
}

.navbar button{
background:#ff9900;border:none;padding:8px;
border-radius:4px;font-weight:bold;cursor:pointer;margin:3px
}

/* suggestions */
#suggestions{
position:absolute;top:45px;left:10px;
background:#fff;width:45%;
z-index:999;border-radius:6px;
box-shadow:0 4px 10px rgba(0,0,0,0.2)
}

/* FILTER */
.filters{text-align:center;padding:10px}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;padding:20px
}

.card{
background:#fff;border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden
}

.card img{width:100%;height:200px;object-fit:contain}

.card-content{text-align:center;padding:10px}
.card-content p{color:#b12704;font-weight:bold}

.buy-btn{
background:#ff9900;border:none;
width:90%;margin:5px auto;
display:flex;align-items:center;justify-content:center;
gap:6px;padding:10px;font-weight:bold;
cursor:pointer;border-radius:6px
}

.buy-btn img{height:18px}

/* FOOTER */
footer{
background:#232f3e;color:#fff;
text-align:center;padding:20px;margin-top:20px
}
</style>

</head>

<body>

<header>
<img src="logo.png">
<span>Koloonline</span>
</header>

<div class="hero">
<img src="logo.png"><br><br>
<h2>Your Global Connection 🌍</h2>
<button onclick="scrollToProducts()" class="buy-btn" style="width:auto">
<img src="logo.png"> Shop Now
</button>
</div>

<div class="navbar">
<input type="text" id="searchInput" placeholder="Search..." oninput="smartSuggest()">
<div id="suggestions"></div>

<button>Cart 🛒 (<span id="cartCount">0</span>)</button>
</div>

<!-- FILTER -->
<div class="filters">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('electronics')">الكترونيات</button>
<button onclick="filterCategory('wearables')">ساعات</button>
</div>

<div id="products" class="products"></div>

<footer>
<img src="logo.png" style="height:30px"><br>
<p>© 2026 Koloonline</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ================= CART ================= */
function addToCart(p){

cart.push(p);
localStorage.setItem("cart", JSON.stringify(cart));
updateCart();

// tracking safe call
if(p && p.asin){
trackEvent("cart", p.asin);
}
}

/* ================= CART UI ================= */
function updateCart(){
document.getElementById("cartCount").innerText = cart.length;
}

/* ================= BUY NOW ================= */
function buyNow(asin){

trackEvent("click", asin);
window.open(buildAffiliateLink(asin), "_blank");
}

/* ================= WHATSAPP ================= */
function orderWhatsApp(product, asin){

if(asin){
trackEvent("whatsapp", asin);
}

let phone = "201XXXXXXXXX";
let msg = `I want to order: ${product}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

/* ================= UNIFIED TRACKING ================= */
function trackEvent(type, asin){

if(!asin) return;

let data = JSON.parse(localStorage.getItem("analytics") || "{}");

if(!data[asin]){
data[asin] = {
click:0,
cart:0,
whatsapp:0,
country:{}
};
}

// safe increment
if(typeof data[asin][type] === "number"){
data[asin][type]++;
}

// country tracking
let country = navigator.language || "US";

if(!data[asin].country[country]){
data[asin].country[country]=0;
}

data[asin].country[country]++;

localStorage.setItem("analytics", JSON.stringify(data));
}

/* ================= HELPERS ================= */
function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function buildAffiliateLink(asin){
return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

/* placeholders */
function smartSuggest(){}
function filterCategory(cat){}

updateCart();

</script>

</body>
</html>
