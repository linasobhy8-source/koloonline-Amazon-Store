<!-- CSS -->
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f9f9f9; }
header { background:#232f3e; color:white; padding:15px; text-align:center; }
.logo { height:50px; }
.navbar { display:flex; gap:10px; padding:10px; background:#fff; align-items:center; }
.search-input { flex:1; padding:5px; }
.button { padding:5px 10px; cursor:pointer; }
#cart-count { margin-left:5px; font-weight:bold; }
.product-grid { display:flex; flex-wrap:wrap; gap:15px; padding:15px; justify-content:center; }
.product-card { background:white; border-radius:10px; padding:10px; width:220px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.product-card img { max-width:100%; border-radius:8px; }
.product-card a { display:inline-block; margin-top:10px; background:#ff9900; color:white; text-decoration:none; padding:8px 12px; border-radius:5px; }
.product-card a:hover { background:#e68a00; }
</style>

<body>

<header>
  <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" alt="Koloonline Logo" class="logo">
</header>

<nav class="navbar">
  <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
  <button class="button" id="searchBtn">Search</button>
  <button class="button" id="cartBtn">Cart 🛒</button>
  <span id="cart-count">0</span>
  <select id="country-select">
    <option value="US">USA</option>
    <option value="CA">Canada</option>
    <option value="PL">Poland</option>
    <option value="EG" selected>Egypt</option>
  </select>
</nav>

<div id="suggestBox"></div>
<div class="product-grid" id="productGrid">Loading products...</div>

<script src="app.js"></script>
</body>
