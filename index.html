<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🔥 Best Amazon Deals</header>

<div class="navbar">

  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search..." 
    oninput="smartSuggest()" 
    onkeypress="handleEnter(event)"
  >

  <button onclick="goCart()">
    Cart 🛒 (<span id="cartCount">0</span>)
  </button>

</div>

<!-- suggestion box -->
<div style="position:relative;">
  <div id="suggestBox"
       style="background:#fff;border-radius:6px;display:none;position:absolute;z-index:999;width:100%;">
  </div>
</div>

<div id="products" class="products"></div>

<script>

// ================= PRODUCTS =================
const products = [
  {
    title: "Echo Dot 5",
    asin: "B09B8Q3YHJ",
    price: "$39.99",
    image: "https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg"
  },
  {
    title: "Smart Watch Pro",
    asin: "B09V7Z4TJG",
    price: "$49.99",
    image: "https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"
  },
  {
    title: "Wireless Earbuds",
    asin: "B08J5F3G18",
    price: "$29.99",
    image: "https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg"
  }
];

// ================= COUNTRY =================
function getCountry(){
  let lang = navigator.language || "en-US";

  if(lang.includes("ar")) return "EG";
  if(lang.includes("en-CA")) return "CA";
  if(lang.includes("pl")) return "PL";

  return "US";
}

// ================= TAG =================
function getTag(c){
  return {
    US: "koloonlinesto-20",
    CA: "linasobhy20d8-20",
    PL: "koloonline-21",
    EG: "onlinesh03f31-21"
  }[c] || "koloonlinesto-20";
}

// ================= DOMAIN =================
function getDomain(c){
  return {
    US: "amazon.com",
    CA: "amazon.ca",
    PL: "amazon.pl",
    EG: "amazon.eg"
  }[c] || "amazon.com";
}

// ================= AFFILIATE LINK =================
function buildAffiliateLink(asin){
  const country = getCountry();
  const domain = getDomain(country);
  const tag = getTag(country);

  return `https://www.${domain}/dp/${asin}?tag=${tag}`;
}

// ================= TRACKING =================
function trackClick(asin){

  if(typeof gtag !== "undefined"){
    gtag('event','click_product',{asin});
  }

  if(typeof fbq !== "undefined"){
    fbq('track','ViewContent',{
      content_ids: [asin],
      content_type: 'product'
    });
  }

  let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");
  clicks[asin] = (clicks[asin] || 0) + 1;
  localStorage.setItem("clicks", JSON.stringify(clicks));
}

// ================= OPEN PRODUCT =================
function openProduct(asin){
  trackClick(asin);
  window.open(buildAffiliateLink(asin), "_blank");
}

// ================= DISPLAY =================
function displayProducts(list){
  let html = "";

  list.forEach(p=>{
    html += `
      <div class="card">
        <img src="${p.image}" alt="${p.title}">

        <div class="card-content">
          <h3>${p.title}</h3>
          <p>${p.price}</p>
        </div>

        <button class="buy-btn" onclick="openProduct('${p.asin}')">
          🔥 Order Now
        </button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ================= 🤖 AI SMART SEARCH =================
function smartSuggest(){

  let input = document.getElementById("searchInput").value.toLowerCase().trim();
  let box = document.getElementById("suggestBox");

  if(!input){
    box.style.display = "none";
    displayProducts(products);
    return;
  }

  // ================= AI SCORE ENGINE =================
  function getScore(title, query){

    title = title.toLowerCase();

    let score = 0;

    let words = query.split(" ");

    words.forEach(word=>{
      if(title.includes(word)) score += 3;
    });

    if(title.startsWith(query)) score += 5;

    if(title === query) score += 10;

    // fuzzy boost
    score += Math.max(0, 5 - Math.abs(title.length - query.length));

    return score;
  }

  // ================= RANK PRODUCTS =================
  let scored = products.map(p=>{
    return {
      ...p,
      score: getScore(p.title, input)
    };
  });

  scored.sort((a,b)=> b.score - a.score);

  let filtered = scored.filter(p => p.score > 0);

  displayProducts(filtered);

  // ================= SUGGEST BOX =================
  if(filtered.length === 0){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  box.innerHTML = "";

  filtered.slice(0,5).forEach(p => {
    box.innerHTML += `
      <div onclick="openProduct('${p.asin}')"
           style="padding:10px;border-bottom:1px solid #eee;cursor:pointer;">
        🤖 ${p.title}
      </div>
    `;
  });
}

// ================= ENTER =================
function handleEnter(e){
  if(e.key === "Enter"){

    let input = document.getElementById("searchInput").value.trim();

    if(!input) return;

    let best = products
      .map(p => ({
        ...p,
        score: p.title.toLowerCase().includes(input.toLowerCase()) ? 1 : 0
      }))
      .sort((a,b)=>b.score-a.score)[0];

    if(best){
      openProduct(best.asin);
    }
  }
}

// ================= CART =================
function goCart(){
  alert("Cart coming soon 😎");
}

// ================= INIT =================
displayProducts(products);

</script>

</body>
</html>
