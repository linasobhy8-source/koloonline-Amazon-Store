<!-- ================= TRACKING CORE ================= -->
<script>
const GTM_ID = "GTM-KNQM8KBN";
const GA_ID = "G-YS8L61XLPR";

/* ===== COUNTRY DETECTION ===== */
function getCountry(){
  const lang = navigator.language || "en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("en-CA")) return "CA";
  if(lang.includes("pl")) return "PL";
  return "US";
}

/* ===== MAIN TRACK FUNCTION ===== */
function trackEvent(eventName, data = {}){

  const payload = {
    country: getCountry(),
    page: window.location.pathname,
    timestamp: new Date().toISOString(),
    ...data
  };

  if(typeof gtag === "function"){
    gtag('event', eventName, payload);
  }

  if(window.dataLayer){
    window.dataLayer.push({
      event: eventName,
      ...payload
    });
  }

  console.log("TRACK:", eventName, payload);
}

/* ===== PAGE VIEW (مرة واحدة فقط) ===== */
trackEvent("page_view");
</script>

<style>

<body>

<!-- GTM NOSCRIPT -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNQM8KBN"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>
  <div class="header-top">
    <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" class="logo">

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search products...">
      <button onclick="searchProducts()">Search</button>
    </div>
  </div>
</header>

<nav class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/product">📦 Products</a>
  <a href="/cart">🛒 Cart</a>
  <a href="/blog">📰 Blog</a>
  <a href="/contact">📞 Contact</a>
  <a href="/dashboard">📊 Dashboard</a>
</nav>

<div class="container" id="products"></div>

<script>

const products = [
  {
    title:"🔥 Smart Watch Pro",
    image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",
    asin:"B09V7Z4TJG"
  },
  {
    title:"🎧 Wireless Earbuds",
    image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",
    asin:"B08G9P7N2X"
  }
];

function getLink(asin){
  return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

/* ===== VIEW PRODUCT ===== */
function trackView(p){
  trackEvent("product_view", {
    asin: p.asin,
    title: p.title
  });
}

/* ===== LOAD PRODUCTS (FIX: no duplicate tracking) ===== */
function load(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>

        <button onclick="
          trackEvent('affiliate_click',{asin:'${p.asin}'});
          window.open('${getLink(p.asin)}','_blank')
        ">
          🛒 Buy on Amazon
        </button>

        <button onclick="trackEvent('add_to_cart',{asin:'${p.asin}'})">
          ➕ Add to Cart
        </button>

      </div>
    `;
  });
}

function searchProducts(){
  const q = document.getElementById("searchInput").value.toLowerCase();

  trackEvent("search",{query:q});

  const container = document.getElementById("products");
  container.innerHTML = "";

  products
    .filter(p => p.title.toLowerCase().includes(q))
    .forEach(p => {

      container.innerHTML += `
        <div class="card">
          <img src="${p.image}">
          <h3>${p.title}</h3>

          <button onclick="
            trackEvent('affiliate_click',{asin:'${p.asin}'});
            window.open('${getLink(p.asin)}','_blank')
          ">
            🛒 Buy on Amazon
          </button>
        </div>
      `;
    });
}

load();

</script>
