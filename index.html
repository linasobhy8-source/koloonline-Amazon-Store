<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🔥 Best Amazon Deals</header>

<div class="navbar">

  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search..." 
    oninput="smartSuggest()" 
    onkeypress="handleEnter(event)"
  >

  <button onclick="goCart()">
    Cart 🛒 (<span id="cartCount">0</span>)
  </button>

  <button onclick="location.href='dashboard.html'">
    📊 Dashboard
  </button>

</div>

<div style="position:relative;">
  <div id="suggestBox"
       style="background:#fff;border-radius:6px;display:none;position:absolute;z-index:999;width:100%;">
  </div>
</div>

<div id="products" class="products"></div>

<script>

// ================= PRODUCTS =================
let products = [
  {
    id: 1,
    title: "Echo Dot 5",
    asin: "B09B8Q3YHJ",
    price: 39.99,
    image: "https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",
    affiliateRate: 0.06
  },
  {
    id: 2,
    title: "Smart Watch Pro",
    asin: "B09V7Z4TJG",
    price: 49.99,
    image: "https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",
    affiliateRate: 0.07
  },
  {
    id: 3,
    title: "Wireless Earbuds",
    asin: "B08J5F3G18",
    price: 29.99,
    image: "https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg",
    affiliateRate: 0.05
  }
];

// ================= CART =================
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ================= SAVE =================
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

// ================= CART COUNT =================
function updateCartCount(){
  let total = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
  document.getElementById("cartCount").innerText = total;
}

// ================= COUNTRY =================
function getCountry(){
  let lang = navigator.language || "en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("en-CA")) return "CA";
  if(lang.includes("pl")) return "PL";
  return "US";
}

// ================= TAG =================
function getTag(c){
  return {
    US: "koloonlinesto-20",
    CA: "linasobhy20d8-20",
    PL: "koloonline-21",
    EG: "onlinesh03f31-21"
  }[c] || "koloonlinesto-20";
}

// ================= DOMAIN =================
function getDomain(c){
  return {
    US: "amazon.com",
    CA: "amazon.ca",
    PL: "amazon.pl",
    EG: "amazon.eg"
  }[c] || "amazon.com";
}

// ================= LINK =================
function buildAffiliateLink(asin){
  const country = getCountry();
  return `https://www.${getDomain(country)}/dp/${asin}?tag=${getTag(country)}`;
}

// ================= TRACK CLICK =================
function trackClick(asin){

  let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");
  clicks[asin] = (clicks[asin] || 0) + 1;
  localStorage.setItem("clicks", JSON.stringify(clicks));

  let today = new Date().toLocaleDateString();
  let daily = JSON.parse(localStorage.getItem("dailyClicks") || "{}");
  daily[today] = (daily[today] || 0) + 1;

  localStorage.setItem("dailyClicks", JSON.stringify(daily));
}

// ================= OPEN PRODUCT =================
function openProduct(asin){
  trackClick(asin);
  window.open(buildAffiliateLink(asin), "_blank");
}

// ================= ADD TO CART =================
function addToCart(id){

  const product = products.find(p => p.id === id);

  let exists = cart.find(p => p.id === id);

  if(exists){
    exists.qty = (exists.qty || 1) + 1;
  } else {
    cart.push({...product, qty: 1});
  }

  saveCart();
}

// ================= SMART RANKING =================
function sortProducts(list){

  let clicks = JSON.parse(localStorage.getItem("clicks") || "{}");

  return list.sort((a,b)=>{

    let aScore = (clicks[a.asin] || 0) * a.affiliateRate;
    let bScore = (clicks[b.asin] || 0) * b.affiliateRate;

    return bScore - aScore;
  });
}

// ================= DISPLAY =================
function displayProducts(list){

  let sorted = sortProducts(list);

  let html = "";

  sorted.forEach(p=>{
    html += `
      <div class="card">

        <img src="${p.image}" alt="${p.title}">

        <div class="card-content">
          <h3>${p.title}</h3>
          <p>💲 ${p.price}</p>
        </div>

        <button class="buy-btn" onclick="addToCart(${p.id})">
          🛒 Add to Cart
        </button>

        <button class="buy-btn" style="background:#28a745;margin-top:5px;"
          onclick="openProduct('${p.asin}')">
          🔥 Buy Now
        </button>

      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ================= SEARCH =================
function smartSuggest(){

  let input = document.getElementById("searchInput").value.toLowerCase().trim();
  let box = document.getElementById("suggestBox");

  if(!input){
    box.style.display = "none";
    displayProducts(products);
    return;
  }

  let filtered = products.filter(p =>
    p.title.toLowerCase().includes(input)
  );

  displayProducts(filtered);

  box.style.display = filtered.length ? "block" : "none";
  box.innerHTML = "";

  filtered.forEach(p=>{
    box.innerHTML += `
      <div onclick="openProduct('${p.asin}')"
        style="padding:10px;border-bottom:1px solid #eee;cursor:pointer;">
        🔎 ${p.title}
      </div>
    `;
  });
}

// ================= ENTER =================
function handleEnter(e){

  if(e.key === "Enter"){

    let input = document.getElementById("searchInput").value.trim();

    let first = products.find(p =>
      p.title.toLowerCase().includes(input.toLowerCase())
    );

    if(first){
      openProduct(first.asin);
    }
  }
}

// ================= CART PAGE =================
function goCart(){
  window.location.href = "cart.html";
}

// ================= INIT =================
displayProducts(products);
updateCartCount();

</script>

</body>
</html>
