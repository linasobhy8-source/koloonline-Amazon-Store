<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloonline Store</title>

<script>
function getCountry(){
  const lang = navigator.language || "en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("en-CA")) return "CA";
  if(lang.includes("pl")) return "PL";
  return "US";
}

function trackEvent(name, data = {}){
  const payload = {
    country: getCountry(),
    page: location.pathname,
    time: new Date().toISOString(),
    ...data
  };

  if(window.dataLayer) window.dataLayer.push({event:name,...payload});
  if(typeof gtag==="function") gtag('event', name, payload);
}
</script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* ===== AMAZON HEADER ===== */
header{
  background:#131921;
  color:white;
  padding:10px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}

.logo{
  height:45px;
}

/* ===== SEARCH ===== */
.search{
  flex:1;
  display:flex;
}

.search input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:4px 0 0 4px;
}

.search button{
  background:#febd69;
  border:none;
  padding:10px 15px;
  cursor:pointer;
  font-weight:bold;
  border-radius:0 4px 4px 0;
}

/* ===== NAV ===== */
nav{
  background:#232f3e;
  padding:10px;
  display:flex;
  gap:15px;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* ===== PRODUCTS ===== */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.card h3{
  font-size:14px;
}

.card button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

.buy{
  background:#ff9900;
}

.cart{
  background:#ffd814;
}
</style>
</head>

<body>

<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNQM8KBN"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<!-- ================= HEADER ================= -->
<header>
  <div class="topbar">

    <img class="logo" src="https://i.postimg.cc/9fVfC1Y4/1000276862.png">

    <div class="search">
      <input id="searchInput" placeholder="ابحث عن منتجات...">
      <button onclick="searchProducts()">بحث</button>
    </div>

  </div>
</header>

<!-- ================= NAV ================= -->
<nav>
  <a href="/">🏠 Home</a>
  <a href="/product">📦 Products</a>
  <a href="/cart">🛒 Cart</a>
  <a href="/dashboard">📊 Dashboard</a>
</nav>

<!-- ================= PRODUCTS ================= -->
<div class="container" id="products"></div>

<script>

let ALL_PRODUCTS = [];

/* ================= LOAD API ================= */
async function loadProducts(){
  try{
    const res = await fetch("/api/products");
    ALL_PRODUCTS = await res.json();
    render(ALL_PRODUCTS);
  }catch(e){
    document.getElementById("products").innerHTML =
    "<h3>API Error</h3>";
  }
}

/* ================= AFFILIATE LINK ================= */
function getLink(asin){

  const country = getCountry();

  let tag = "koloonlinesto-20";

  if(country==="EG") tag="onlinesh03f31-21";
  if(country==="US") tag="onlinesho0429-20";
  if(country==="CA") tag="linasobhy20d8-20";
  if(country==="PL") tag="koloonline-21";

  return `https://www.amazon.com/dp/${asin}?tag=${tag}`;
}

/* ================= RENDER ================= */
function render(list){

  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {

    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>

        <button class="buy"
          onclick="
            trackEvent('affiliate_click',{asin:'${p.asin}'});
            window.open('${getLink(p.asin)}','_blank')
          ">
          🛒 Buy Now
        </button>

        <button class="cart"
          onclick="trackEvent('add_to_cart',{asin:'${p.asin}'})">
          ➕ Add Cart
        </button>
      </div>
    `;
  });
}

/* ================= SEARCH ================= */
function searchProducts(){

  const q = document.getElementById("searchInput").value.toLowerCase();

  trackEvent("search",{query:q});

  const filtered = ALL_PRODUCTS.filter(p =>
    p.title.toLowerCase().includes(q)
  );

  render(filtered);
}

loadProducts();

</script>

</body>
</html>
