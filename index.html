<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Koloonline AI Store</title>

<style>

body { margin:0; font-family: Arial; }

/* ===== HEADER ===== */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;
  color:#fff;
  position:sticky;
  top:0;
}

.logo { font-weight:bold; }

.search {
  width:50%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* ===== PRODUCTS ===== */
#products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  width:100%;
  padding:10px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
}

</style>

</head>

<body>

<!-- ===== HEADER ===== -->
<header class="header">

  <div class="logo">🔥 Koloonline Store</div>

  <input id="searchInput" class="search" placeholder="ابحث..." onkeyup="liveSearch()"/>

  <div>🛒</div>

</header>

<!-- ===== PRODUCTS ===== -->
<div id="products"></div>

<script>

// ================= ZAPIER =================
const ZAPIER_URL = "https://hooks.zapier.com/hooks/catch/26698099/u0jjg9s/";

// ================= PRODUCTS DATA =================
let allProducts = [];

// ================= LOAD PRODUCTS =================
async function loadProducts(q="smart") {

  const res = await fetch(`/api/products?q=${q}`);
  allProducts = await res.json();

  displayProducts(allProducts);
}

// ================= DISPLAY =================
function displayProducts(products){

  let html="";

  products.forEach(p=>{

    html += `
      <div class="card">
        <img src="${p.image || ''}">
        <h3>${p.title}</h3>
        <p>${p.price}</p>

        <button onclick="trackClick('${p.title}','${p.asin}')">
          اطلب الآن
        </button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ================= SEARCH =================
function liveSearch(){

  let q = document.getElementById("searchInput").value;

  if(q.length > 1){
    loadProducts(q);
  } else {
    loadProducts("smart");
  }
}

// ================= TRACK =================
function trackClick(title, asin){

  let link = `https://amazon.com/dp/${asin}`;

  fetch(ZAPIER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({title,asin,link})
  });

  window.open(link,"_blank");
}

// ================= INIT =================
loadProducts();

</script>

</body>
</html>
