<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloonline Store</title>
<link rel="icon" href="favicon.ico">
<style>
body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
header { background: #232f3e; color: #fff; padding: 15px; font-size: 22px; font-weight: bold; text-align: center; }
.navbar { display: flex; justify-content: space-between; padding: 10px; background: #37475a; color: #fff; flex-wrap: wrap; }
.navbar button { color: #fff; background: #ff9900; border: none; margin-right: 10px; padding: 10px; cursor: pointer; border-radius:6px; font-weight:bold; transition:0.2s; }
.navbar button:hover { background: #e68a00; }
.container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; justify-content: center; }
.card { background: #fff; padding: 20px; border-radius: 10px; width: 300px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align:center; }
.card img { width:100%; max-height:200px; object-fit:contain; border-radius:6px; }
.card h2 { margin-top:10px; }
.card p { font-size:14px; margin:10px 0; }
.card button { background:#ff9900; color:#fff; border:none; padding:10px; cursor:pointer; border-radius:6px; font-weight:bold; width:100%; margin-top:10px; transition:0.2s; }
.card button:hover { background:#e68a00; }
footer { text-align:center; padding:20px; background:#232f3e; color:#fff; margin-top:20px; }
.stat-badge { display:block; margin-top:5px; font-size:12px; color:#555; }
</style>
</head>
<body>

<header>
  <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" alt="Koloonline Logo" style="height:50px;">
  <p>📞 واتس: <a href="https://wa.me/201205271929" style="color:#25d366;">01205271929</a></p>
</header>

<div class="navbar">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='dashboard.html'">📊 Dashboard</button>
</div>

<div class="container" id="productsContainer">
  <!-- المنتجات ستتحمل هنا ديناميكي -->
</div>

<footer>
  <p>© 2026 Koloonline Store by Lina Sobhy</p>
</footer>

<script>
const products=[
  {asin:"B09V7Z4TJG",title:"🔥 Smart Watch Pro",desc:"Top smart watches with fitness tracking, health features and battery life.",image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"},
  {asin:"B08G9P7N2X",title:"📱 Wireless Earbuds",desc:"High quality sound, low price, best Amazon picks.",image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg"}
];

// ================= TRACKING =================
function trackEvent(type, asin){
  fetch("/api/track",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({event:type,asin:asin,timestamp:new Date().toISOString()})
  }).catch(e=>console.log("tracking error"));
}

function openProduct(e, asin){
  e.stopPropagation();
  trackEvent("product_open", asin);
  window.location.href="product.html?asin="+asin;
}

// ================= LOAD PRODUCTS =================
async function loadProducts(){
  const container=document.getElementById("productsContainer");
  container.innerHTML="";
  // Fetch stats for badges
  let stats={};
  try{
    const res=await fetch("/api/analytics");
    const data=await res.json();
    if(data.success) stats=data.topProducts.reduce((acc,p)=>{acc[p.asin]={clicks:p.clicks,orders:p.orders,whatsapp:p.whatsapp}; return acc;},{});
  }catch(e){ console.log("Error fetching stats"); }

  products.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.onclick=()=>openProduct(event,p.asin);
    const clickCount=stats[p.asin]?.clicks||0;
    const orderCount=stats[p.asin]?.orders||0;
    const waCount=stats[p.asin]?.whatsapp||0;
    div.innerHTML=`
      <img src="${p.image}" alt="${p.title}">
      <h2>${p.title}</h2>
      <p>${p.desc}</p>
      <span class="stat-badge">Clicks: ${clickCount} | Orders: ${orderCount} | WhatsApp: ${waCount}</span>
      <button onclick="openProduct(event,'${p.asin}')">📖 View Product</button>
    `;
    container.appendChild(div);
  });
}

// ================= INIT =================
loadProducts();
</script>

</body>
</html>
