<style>
body{
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:10px 15px;
}

.logo{
  height:50px;
}

/* HEADER FLEX */
.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  flex-wrap:wrap;
}

/* SEARCH */
.search-bar{
  display:flex;
  flex:1;
  gap:10px;
}

.search-bar input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:4px;
}

.search-bar button{
  padding:10px 15px;
  background:#febd69;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

/* NAVBAR */
.navbar{
  background:#232f3e;
  display:flex;
  gap:15px;
  padding:10px;
  flex-wrap:wrap;
}

.navbar a{
  color:white;
  text-decoration:none;
}

/* PRODUCTS */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  width:250px;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.card button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff9900;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="header-top">

    <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" class="logo">

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
      <button onclick="searchProducts()">بحث</button>
    </div>

  </div>
</header>

<nav class="navbar">
  <a href="/">🏠 الرئيسية</a>
  <a href="/products">📦 المنتجات</a>
  <a href="/cart">🛒 السلة</a>
  <a href="/blog">📰 المدونة</a>
  <a href="/contact">📞 اتصل بنا</a>
</nav>

<div class="container" id="products"></div>

<script>
// ================= PRODUCTS =================
const products = [
  {
    title:"🔥 Smart Watch Pro",
    image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",
    asin:"B09V7Z4TJG"
  },
  {
    title:"🎧 Wireless Earbuds",
    image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",
    asin:"B08G9P7N2X"
  }
];

// ================= LOAD =================
function load(){
  const container=document.getElementById("products");
  container.innerHTML="";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>

        <button onclick="goToProduct('${p.asin}','${p.title}')">
          🔥 عرض المنتج
        </button>
      </div>
    `;
  });
}

// ================= GO PRODUCT =================
function goToProduct(asin,title){
  trackEvent("product_click",{asin,title});
  window.location.href = "/dp/" + asin;
}

// ================= SEARCH =================
function searchProducts(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const container=document.getElementById("products");
  container.innerHTML="";

  products.filter(p=>p.title.toLowerCase().includes(q))
  .forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>

        <button onclick="goToProduct('${p.asin}','${p.title}')">
          🔥 عرض المنتج
        </button>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
