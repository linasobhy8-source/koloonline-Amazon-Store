<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store - Best Amazon Deals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Best Amazon deals, smart watches, gadgets and trending products with fast access and exclusive offers.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.koloonline.online/">
<link rel="icon" href="favicon.ico">

<!-- Google Tag Manager -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8KBN"></script>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');
</script>

<!-- CSS -->
<link rel="stylesheet" href="_assets_/css/style.css">

<!-- Vercel Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

<style>
.product-grid { display:flex; flex-wrap:wrap; gap:15px; padding:15px; }
.product-card { background:#fff; padding:10px; border-radius:10px; width:220px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.product-card img { max-width:100%; border-radius:8px; }
.button { padding:6px 10px; margin-top:5px; cursor:pointer; }
</style>

</head>
<body>

<header class="header">
  <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" class="logo">
</header>

<nav class="navbar">
  <input type="text" id="searchInput" placeholder="Search products...">
  <button onclick="handleSearch()">Search</button>
  <button onclick="viewCart()">🛒</button>
  <span id="cart-count">0</span>
</nav>

<div id="productGrid" class="product-grid"></div>

<script>

// ================= CONFIG =================
const affiliateTags = {
  EG: "onlinesh03f31-21",
  CA: "linasobhy20d8-20",
  US: "koloonlinesto-20",
  PL: "koloonline-21"
};

// ================= HELPERS =================
function getCountry() {
  const lang = navigator.language || "en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("pl")) return "PL";
  if(lang.includes("en-CA")) return "CA";
  return "US";
}

function buildAffiliateLink(asin) {
  const c = getCountry();
  let domain = "amazon.com";
  if(c==="EG") domain="amazon.eg";
  if(c==="CA") domain="amazon.ca";
  if(c==="PL") domain="amazon.pl";
  const tag = affiliateTags[c] || affiliateTags["US"];
  return `https://${domain}/dp/${asin}?tag=${tag}`;
}

// ================= CART =================
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  document.getElementById("cart-count").innerText = cart.length;
}

function addToCart(product) {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert("Added to cart 🛒");
}

function viewCart() {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  alert("Cart has " + cart.length + " items");
}

// ================= FETCH =================
async function fetchProducts(query="") {
  try {
    const country = getCountry().toLowerCase();

    const res = await fetch(`/api/products?country=${country}`);
    const data = await res.json();

    let products = data.products || [];

    // فلترة البحث
    if(query){
      products = products.filter(p =>
        p.title.toLowerCase().includes(query.toLowerCase())
      );
    }

    renderProducts(products);
    updateCartCount();

  } catch(err) {
    console.error(err);
    document.getElementById("productGrid").innerHTML = "Error loading products";
  }
}

// ================= RENDER =================
function renderProducts(products) {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";

  if(products.length === 0){
    grid.innerHTML = "<p>لا توجد منتجات</p>";
    return;
  }

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
      <img src="${p.image}" alt="${p.title}">
      <h3>${p.title}</h3>
      <p>⭐ ${p.rating}</p>

      <button class="button" onclick="window.open('${buildAffiliateLink(p.asin)}','_blank')">
        🛒 Buy from Amazon
      </button>

      <button class="button" onclick='addToCart(${JSON.stringify(p)})'>
        ➕ Add to Cart
      </button>
    `;

    grid.appendChild(card);
  });
}

// ================= SEARCH =================
function handleSearch(){
  const q = document.getElementById("searchInput").value;
  fetchProducts(q);
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  fetchProducts();
});

</script>

</body>
</html>
