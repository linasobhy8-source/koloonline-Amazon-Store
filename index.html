<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Store - Best Amazon Deals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Best Amazon deals, smart watches, gadgets and trending products with fast access and exclusive offers.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://www.koloonline.online/">
<link rel="icon" href="favicon.ico">

<!-- ================= Google Tag Manager ================= -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8KBN"></script>

<!-- ================= Google Analytics ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');
</script>

<!-- ================= CSS ================= -->
<link rel="stylesheet" href="_assets_/css/style.css">

<!-- ================= Vercel Web Analytics ================= -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<header class="header">
  <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" alt="Koloonline Logo" class="logo">
</header>

<nav class="navbar">
  <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
  <button class="button" onclick="fetchProducts(searchInput.value)">Search</button>
  <button class="button" onclick="viewCart()">
    <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" alt="Cart" style="height:25px; vertical-align:middle;">
  </button>
  <span id="cart-count">0</span>
</nav>

<div id="suggestBox"></div>
<div class="product-grid" id="productGrid"></div>

<script>
// ================= CONFIG =================
const affiliateTags = {
  EG: "onlinesh03f31-21",
  CA: "linasobhy20d8-20",
  US: "koloonlinesto-20",
  PL: "koloonline-21"
};

// ================= TRACKING =================
function trackEvent(asin, type){
  fetch('/api/analytics', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      asin: asin,
      type: type,
      country: getCountry()
    })
  });
}

// ================= HELPER FUNCTIONS =================
function getCountry() {
  const lang = navigator.language || "en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("pl")) return "PL";
  if(lang.includes("en-CA")) return "CA";
  return "US";
}

function buildAffiliateLink(asin) {
  const c = getCountry();
  let domain = "amazon.com";
  if(c==="EG") domain="amazon.eg";
  if(c==="CA") domain="amazon.ca";
  if(c==="PL") domain="amazon.pl";
  const tag = affiliateTags[c] || affiliateTags["US"];
  return `https://${domain}/dp/${asin}?tag=${tag}`;
}

// ================= CART =================
let allProducts = [];
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  document.getElementById("cart-count").innerText = cart.length;
}
function addToCart(product) {
  trackEvent(product.asin, "cart");
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert("Added to cart 🛒");
}
function viewCart() {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  alert("Cart has " + cart.length + " items.");
}

// ================= FETCH PRODUCTS =================
async function fetchProducts(query="") {
  try {
    const res = await fetch(`/api/products?search=${encodeURIComponent(query)}`);
    const data = await res.json();
    allProducts = data;
    renderProducts(data);
    updateCartCount();
  } catch(err) {
    console.error("Error fetching products:", err);
  }
}

// ================= RENDER PRODUCTS =================
function renderProducts(products) {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";
  products.forEach(p => {
    grid.innerHTML += `
      <div class="product-card card">
        <img src="${p.img || p.image}" alt="${p.title}">
        <h3>${p.title}</h3>
        <p class="price">${p.price}</p>
        <button class="buy-btn button amazon" onclick="trackEvent('${p.asin}','click'); window.open('${buildAffiliateLink(p.asin)}','_blank')">
          🛒 Buy from Amazon
        </button>
        <button class="buy-btn button cod" onclick='addToCart(${JSON.stringify(p)})'>
          📦 Add to Cart
        </button>
      </div>
    `;
  });
}

// ================= SEARCH & SUGGEST =================
const input = document.getElementById("searchInput");
const suggest = document.getElementById("suggestBox");
input.addEventListener("input", () => {
  const value = input.value.toLowerCase();
  if (!value) {
    suggest.style.display = 'none';
    renderProducts(allProducts);
    return;
  }
  const filtered = allProducts.filter(p => p.title.toLowerCase().includes(value));
  renderProducts(filtered);
  suggest.innerHTML = '';
  filtered.forEach(p => {
    const div = document.createElement("div");
    div.innerText = p.title;
    div.onclick = () => {
      input.value = p.title;
      renderProducts([p]);
      suggest.style.display = 'none';
    };
    suggest.appendChild(div);
  });
  suggest.style.display = filtered.length ? 'block' : 'none';
});

// ================= INIT =================
fetchProducts();
updateCartCount();
</script>

</body>
</html>
