<script>

/* ================= TRACKING ================= */
function trackEvent(type,data){
  fetch("/api/track",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      event:type,
      data:data,
      page:"landing",
      time:new Date().toISOString()
    })
  }).catch(()=>{});
}

/* ================= BUY ================= */
function buyNow(asin){
  trackEvent("amazon_click",asin);
  window.open(`https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`,"_blank");
}

/* ================= WHATSAPP ================= */
function orderWhatsApp(product){
  trackEvent("whatsapp_click",product);
  window.open("https://wa.me/201205271929?text="+encodeURIComponent("I want to order: "+product));
}

/* ================= FAQ ================= */
const faqs=[
{q:"هل المنتج أصلي؟",a:"نعم من Amazon مباشرة"},
{q:"هل يوجد شحن؟",a:"حسب بلدك والبائع"},
{q:"هل الدفع آمن؟",a:"نعم عبر Amazon"}
];

function loadFAQ(){
  const container=document.getElementById("faq");
  faqs.forEach(f=>{
    const p=document.createElement("p");
    p.innerHTML=`<b>${f.q}</b><br>${f.a}`;
    container.appendChild(p);
  });
}

loadFAQ();

</script>
