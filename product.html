<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="pageTitle">Koloonline Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= SEO ================= -->
<meta name="description" content="Best Amazon deals and product details">
<meta property="og:type" content="product">
<meta property="og:site_name" content="Koloonline Store">
<meta property="og:title" content="Koloonline Product">
<meta property="og:description" content="Best Amazon deals">
<meta property="og:image" content="">
<meta property="og:url" content="">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Koloonline Product">
<meta name="twitter:description" content="Best Amazon deals">
<meta name="twitter:image" content="">

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');

function trackEvent(name, data = {}) {
  gtag('event', name, data);
}
</script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
  background:#232f3e;
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:26px;
}

.navbar {
  display:flex;
  justify-content:center;
  gap:10px;
  background:#37475a;
  padding:10px;
}

.navbar a {
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border-radius:5px;
  font-weight:bold;
}

.navbar a:hover { background:#e68a00; }

.container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
}

.product-img {
  width:100%;
  max-height:320px;
  object-fit:contain;
}

.price {
  color:#b12704;
  font-size:22px;
  font-weight:bold;
}

.buy-btn {
  background:#ff9900;
  border:none;
  padding:12px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
  border-radius:6px;
}

.whatsapp { background:#25D366; color:#fff; }
</style>
</head>

<body>

<header>🔥 Koloonline Product</header>

<nav class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/products">📦 Products</a>
</nav>

<div class="container">
  <img id="image" class="product-img">
  <h1 id="title"></h1>
  <p class="price" id="price"></p>

  <button class="buy-btn" onclick="buyNow()">🔥 Buy Now</button>
  <button class="buy-btn whatsapp" onclick="orderWhatsApp()">📲 WhatsApp</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const asin = params.get("asin");

let product = null;

/* ================= LOAD FROM API ================= */
async function loadProduct(){
  try{
    const res = await fetch("/api/products");
    const data = await res.json();

    product = data.products.find(p => p.asin === asin);

    if(!product){
      document.body.innerHTML = "<h2 style='text-align:center'>Not Found</h2>";
      return;
    }

    render();

  }catch(e){
    document.body.innerHTML = "<h2>Error loading product</h2>";
  }
}

/* ================= RENDER ================= */
function render(){

  document.getElementById("title").innerText = product.title;
  document.getElementById("price").innerText = "$" + product.price;
  document.getElementById("image").src = product.image;

  /* SEO dynamic */
  document.title = product.title + " | Koloonline";

  document.querySelector('meta[name="description"]').setAttribute("content", product.title);

  document.querySelector('meta[property="og:title"]').setAttribute("content", product.title);
  document.querySelector('meta[property="og:image"]').setAttribute("content", product.image);
  document.querySelector('meta[property="og:url"]').setAttribute("content", window.location.href);

  document.querySelector('meta[name="twitter:title"]').setAttribute("content", product.title);
  document.querySelector('meta[name="twitter:image"]').setAttribute("content", product.image);

  trackEvent("product_view", { asin: product.asin });
}

/* ================= BUY ================= */
function buyNow(){

  const tag = product.tag?.US || "koloonlinesto-20";

  const url = `https://www.amazon.com/dp/${product.asin}?tag=${tag}`;

  trackEvent("buy_click", { asin: product.asin });

  window.open(url, "_blank");
}

/* ================= WHATSAPP ================= */
function orderWhatsApp(){
  const msg = "I want to order: " + product.title;
  window.open(`https://wa.me/201205271929?text=${encodeURIComponent(msg)}`);
}

loadProduct();
</script>

</body>
</html>
