<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koloonline Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');

function trackEvent(eventName, params = {}) {
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({ event: eventName, ...params });

  if (typeof gtag === "function") {
    gtag('event', eventName, params);
  }
}
</script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
  background:#232f3e;
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:26px;
}

.navbar {
  display:flex;
  justify-content:center;
  gap:10px;
  background:#37475a;
  padding:10px;
}

.navbar a {
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border-radius:5px;
  font-weight:bold;
}

.navbar a:hover { background:#e68a00; }

.container {
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
}

.product-img {
  width:100%;
  max-height:320px;
  object-fit:contain;
}

.price {
  color:#b12704;
  font-size:22px;
  font-weight:bold;
}

.buy-btn {
  background:#ff9900;
  border:none;
  padding:12px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
  border-radius:6px;
}

.whatsapp { background:#25D366; color:#fff; }

.trust {
  background:#e8f5e9;
  padding:12px;
  border-radius:6px;
  margin-top:15px;
}
</style>
</head>

<body>

<header>🔥 Koloonline Product</header>

<nav class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/products">📦 Products</a>
  <a href="/cart">🛒 Cart</a>
  <a href="/blog">📰 Blog</a>
  <a href="/contact">✉️ Contact</a>
  <a href="/dashboard">📊 Dashboard</a>
</nav>

<div class="container">

<img id="image" class="product-img">
<h1 id="title"></h1>
<p class="price" id="price"></p>

<div class="trust">
✔ Secure Purchase <br>
✔ Fast Delivery <br>
✔ High Quality Product
</div>

<button class="buy-btn" onclick="buyNow()">🔥 Buy Now</button>
<button class="buy-btn whatsapp" onclick="orderWhatsApp()">📲 Order via WhatsApp</button>

<h2>FAQ</h2>
<div id="faqSection"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const asin = params.get("asin");

let product = null;

/* ================= LOAD FROM API ================= */
async function loadProduct(){

  const res = await fetch("/api/products");
  const products = await res.json();

  product = products.find(p => p.asin === asin);

  if(!product){
    document.body.innerHTML = "<h2 style='text-align:center'>Product Not Found</h2>";
    return;
  }

  render();
}

/* ================= RENDER ================= */
function render(){

  trackEvent("product_view", {
    asin: product.asin,
    title: product.title
  });

  document.getElementById("title").innerText = product.title;
  document.getElementById("price").innerText = "$" + product.price;
  document.getElementById("image").src = product.image;

  const faqs = [
    {q:"Is this product original?", a:"Yes, from Amazon."},
    {q:"Shipping time?", a:"Fast delivery."},
    {q:"Return policy?", a:"Amazon policy applies."}
  ];

  const faqSection = document.getElementById("faqSection");
  faqSection.innerHTML = "";

  faqs.forEach(f=>{
    const p = document.createElement("p");
    p.innerHTML = `<b>Q:</b> ${f.q}<br>${f.a}`;
    faqSection.appendChild(p);
  });
}

/* ================= BUY NOW (FINAL AFFILIATE LOGIC) ================= */
function buyNow(){

  trackEvent("buy_now_click", {
    asin: product.asin,
    title: product.title
  });

  // 🌍 تحديد الدولة
  const lang = navigator.language || "en";

  let tag = "koloonlinesto-20"; // default

  if(lang.includes("ar")) tag = "onlinesh03f31-21"; // Egypt
  else if(lang.includes("en-US")) tag = "onlinesho0429-20"; // USA
  else if(lang.includes("en-CA")) tag = "linasobhy20d8-20"; // Canada
  else if(lang.includes("pl")) tag = "koloonline-21"; // Poland

  window.open(
    `https://www.amazon.com/dp/${product.asin}?tag=${tag}`,
    "_blank"
  );
}

/* ================= WHATSAPP ================= */
function orderWhatsApp(){
  const msg = "I want to order: " + product.title;
  window.open(`https://wa.me/201205271929?text=${encodeURIComponent(msg)}`);
}

loadProduct();
</script>

</body>
</html>
