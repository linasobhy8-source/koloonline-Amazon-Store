<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>🔥 Product Details</header>

<!-- ================= CART TOP BAR ================= -->
<div class="navbar">
  🛒 Cart: <span id="cart-count">0</span>
</div>

<!-- ================= PRODUCT CONTAINER ================= -->
<div id="product" class="products"></div>

<script>

// ================= CART =================
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// update cart count
function updateCartCount(){
  document.getElementById("cart-count").innerText = cart.length;
}

// ================= ADD TO CART =================
function addToCart(product){

  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();
  alert("Added to cart 🛒");
}

// ================= LOAD PRODUCT =================
function loadProduct(){

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  // 👇 نفس منتجات index (مؤقتًا)
  const products = [
    {
      id: "1",
      title: "Echo Dot 5",
      price: "$39.99",
      image: "https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg"
    },
    {
      id: "2",
      title: "Smart Watch Pro",
      price: "$49.99",
      image: "https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg"
    },
    {
      id: "3",
      title: "Wireless Earbuds",
      price: "$29.99",
      image: "https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_SL1500_.jpg"
    }
  ];

  const p = products.find(x => x.id === id);

  const container = document.getElementById("product");

  if(!p){
    container.innerHTML = `
      <div style="text-align:center;padding:50px;">
        ❌ Product not found
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="card">

      <img src="${p.image}" alt="${p.title}">

      <div class="card-content">
        <h1>${p.title}</h1>
        <p>${p.price}</p>
      </div>

      <button class="buy-btn" onclick='addToCart(${JSON.stringify(p)})'>
        🛒 Add to Cart
      </button>

    </div>
  `;
}

// ================= INIT =================
loadProduct();
updateCartCount();

</script>

</body>
</html>
