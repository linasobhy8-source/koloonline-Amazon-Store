<script>

const affiliateTags = {
  EG:"onlinesh03f31-21",
  US:"koloonlinesto-20",
  CA:"linasobhy20d8-20",
  PL:"koloonline-21"
};

function getCountry(){
  let lang=navigator.language||"en-US";
  if(lang.includes("ar")) return "EG";
  if(lang.includes("pl")) return "PL";
  if(lang.includes("en-CA")) return "CA";
  return "US";
}

/* ================= CORE TRACKING (LIVE) ================= */
function track(eventType,data={}){
  const payload={
    event:eventType,
    country:getCountry(),
    time:new Date().toISOString(),
    ...data
  };

  // GA4
  if(typeof gtag==="function"){
    gtag('event',eventType,data);
  }

  // GTM
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push(payload);

  // FIREBASE/API (LIVE TRACKING)
  fetch("/api/analytics",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  console.log("TRACKED:",payload);
}

/* ================= PRODUCTS ================= */
const products=[
  {title:"🔥 Smart Watch Pro",image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",asin:"B09V7Z4TJG"},
  {title:"🎧 Wireless Earbuds",image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",asin:"B08G9P7N2X"}
];

function getLink(asin){
  return `https://www.amazon.com/dp/${asin}?tag=${affiliateTags[getCountry()]}`;
}

/* ================= LOAD ================= */
function load(){
  const container=document.getElementById("products");
  container.innerHTML="";

  products.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.image}">
      <h3>${p.title}</h3>
      <button onclick="buy('${p.asin}','${p.title}')">
        🛒 Buy on Amazon
      </button>
    `;

    container.appendChild(card);
  });
}

/* ================= BUY CLICK ================= */
function buy(asin,title){
  track("product_click",{asin,title});
  window.open(getLink(asin),'_blank');
}
