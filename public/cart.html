<style>
body {font-family: Arial; margin:0; background:#f4f4f4;}
header {background:#232f3e;color:#fff;padding:15px;text-align:center;font-size:22px;}
.navbar {display:flex;flex-wrap:wrap;justify-content:center;gap:10px;background:#37475a;padding:10px;}
.navbar a {color:#fff;text-decoration:none;padding:8px 12px;border-radius:6px;font-weight:bold;}
.navbar a:hover {background:#e68a00;}
.navbar a.active {background:#ff9900;}

.cart {max-width:700px;margin:20px auto;background:#fff;padding:20px;border-radius:10px;}
.cart-item {display:flex;justify-content:space-between;align-items:center;margin:10px 0;gap:10px;}
.item-name {flex:2;}
.item-qty input {width:60px;}
.item-price {flex:1;text-align:center;}

.remove-btn {background:#dc3545;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}

.checkout {
  margin-top:15px;
  padding:12px;
  background:#ff9900;
  color:#fff;
  border:none;
  width:100%;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.faq {max-width:700px;margin:20px auto;}
.faq p {background:#fff;padding:10px;border-radius:6px;margin-bottom:10px;}

<body>

<header>🛒 Koloonline Store</header>

<nav class="navbar">
  <a href="/">🏠 الرئيسية</a>
  <a href="/products">📦 المنتجات</a>
  <a href="/cart">🛒 السلة</a>
  <a href="/blog">📰 المدونة</a>
  <a href="/contact">✉️ الدعم</a>
  <a href="/dashboard">📊 لوحة التحكم</a>
</nav>

<div class="cart">
  <h2>🛍️ Your Selected Products</h2>
  <div id="cart-items"></div>

  <button class="checkout" onclick="checkout()">🛒 Buy All on Amazon</button>
</div>

<div class="faq" id="faqSection"></div>

<script>
// ================= TRACKING =================
function trackEvent(type, value){
  if(typeof gtag === "function"){
    gtag('event', type, {
      event_category: "engagement",
      event_label: value
    });
  }

  if(window.dataLayer){
    window.dataLayer.push({
      event: type,
      value: value
    });
  }

  console.log("Tracked:", type, value);
}

trackEvent("page_view", window.location.pathname);

// ================= COUNTRY =================
function getCountry(){
  const lang = navigator.language || "en-US";

  if(lang.includes("ar")) return "EG";
  if(lang.includes("en-CA")) return "CA";
  if(lang.includes("pl")) return "PL";
  return "US";
}

// ================= AMAZON LINK =================
function getAmazonLink(item){
  const country = getCountry();

  let domain = "amazon.com";
  let tag = "koloonlinesto-20";

  if(country === "EG"){
    domain = "amazon.eg";
    tag = "onlinesh03f31-21";
  }

  if(country === "CA"){
    domain = "amazon.ca";
    tag = "onlinesho0429-20";
  }

  if(country === "PL"){
    domain = "amazon.pl";
    tag = "koloonline-21";
  }

  return `https://${domain}/dp/${item.asin}?tag=${tag}`;
}

// ================= LOAD CART =================
function loadCart() {
  const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
  const container = document.getElementById('cart-items');
  container.innerHTML = '';

  if(cartItems.length === 0){
    container.innerHTML = "<p>السلة فارغة 🛒</p>";
    return;
  }

  cartItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';

    div.innerHTML = `
      <div class="item-name">${item.title || item.name}</div>
      <div class="item-qty">
        <input type="number" value="${item.quantity || 1}" min="1"
        onchange="updateQuantity('${item.asin}', this.value)">
      </div>
      <div class="item-price">$${(item.price || 0).toFixed(2)}</div>
      <button class="remove-btn" onclick="removeItem('${item.asin}')">❌</button>
    `;

    container.appendChild(div);
  });
}

// ================= UPDATE =================
function updateQuantity(id, quantity) {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart = cart.map(item=>{
    if(item.asin === id){
      item.quantity = Number(quantity);
    }
    return item;
  });
  localStorage.setItem('cart', JSON.stringify(cart));
  loadCart();
}

// ================= REMOVE =================
function removeItem(id) {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart = cart.filter(item => item.asin !== id);
  localStorage.setItem('cart', JSON.stringify(cart));
  loadCart();
}

// ================= CHECKOUT =================
function checkout() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];

  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  cart.forEach(item=>{
    const link = getAmazonLink(item);

    trackEvent("buy_click", item.asin);

    window.open(link, "_blank");
  });
}

// ================= FAQ =================
const faqs = [
  {q:"كيف أشتري المنتج؟", a:"اضغط على زر الشراء وسيتم تحويلك مباشرة إلى Amazon"},
  {q:"هل المنتجات أصلية؟", a:"نعم من Amazon الرسمي"},
  {q:"هل الشحن متاح؟", a:"الشحن يتم حسب بلدك عبر Amazon"}
];

function renderFAQ(){
  const container=document.getElementById("faqSection");
  faqs.forEach(f=>{
    const p=document.createElement("p");
    p.innerHTML=`<strong>${f.q}</strong><br>${f.a}`;
    container.appendChild(p);
  });
}

// INIT
loadCart();
renderFAQ();
</script>

</body>
</html>
