<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Shopping Cart | Koloonline</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f4f4f4;
}

/* HEADER */
header {
  background:#232f3e;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
}

/* NAVBAR */
.navbar {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  background:#37475a;
  padding:10px;
}
.navbar a {
  color:#fff;
  text-decoration:none;
  padding:8px 12px;
  border-radius:6px;
  font-weight:bold;
}
.navbar a:hover { background:#e68a00; }
.navbar a.active { background:#ff9900; }

/* CART */
.cart {
  max-width:700px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.cart-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
  gap:10px;
}

.item-name { flex:2; }
.item-qty input { width:60px; }
.item-price { flex:1; text-align:center; }

.remove-btn {
  background:#dc3545;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* BUTTONS */
.checkout {
  margin-top:15px;
  padding:10px;
  background:#28a745;
  color:#fff;
  border:none;
  width:100%;
  border-radius:6px;
  cursor:pointer;
}

.whatsapp {
  margin-top:10px;
  padding:10px;
  background:#25D366;
  color:#fff;
  border:none;
  width:100%;
  border-radius:6px;
  cursor:pointer;
}

/* FAQ */
.faq {
  max-width:700px;
  margin:20px auto;
}
.faq p {
  background:#fff;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
}

/* MOBILE */
@media(max-width:600px){
  .navbar { flex-direction:column; align-items:center; }
  .cart-item { flex-direction:column; align-items:flex-start; }
}
</style>
</head>

<body>

<header>🛒 Koloonline Cart</header>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/">🏠 الرئيسية</a>
  <a href="/products">📦 المنتجات</a>
  <a href="/cart">🛒 السلة</a>
  <a href="/blog">📰 المدونة</a>
  <a href="/contact">✉️ اتصل بنا</a>
  <a href="/dashboard">📊 لوحة التحكم</a>
</nav>

<script>
const currentPath = window.location.pathname.toLowerCase();
document.querySelectorAll('.navbar a').forEach(link=>{
  if(link.getAttribute('href') === currentPath){
    link.classList.add('active');
  }
});
</script>

<!-- CART -->
<div class="cart">
  <h2>Shopping Cart</h2>
  <div id="cart-items"></div>

  <button class="checkout" onclick="checkout()">✅ Checkout</button>
  <button class="whatsapp" onclick="sendWhatsApp()">📲 Order via WhatsApp</button>
</div>

<!-- FAQ -->
<div class="faq" id="faqSection"></div>

<script>
// ================= LOAD CART =================
function loadCart() {
    const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
    const container = document.getElementById('cart-items');
    container.innerHTML = '';

    if(cartItems.length === 0){
        container.innerHTML = "<p>السلة فارغة 🛒</p>";
        return;
    }

    cartItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';

        div.innerHTML = `
            <div class="item-name">${item.title || item.name}</div>
            <div class="item-qty">
                <input type="number" value="${item.quantity || 1}" min="1"
                onchange="updateQuantity('${item.asin || item.id}', this.value)">
            </div>
            <div class="item-price">$${(item.price || 0).toFixed(2)}</div>
            <button class="remove-btn" onclick="removeItem('${item.asin || item.id}')">❌</button>
        `;

        container.appendChild(div);
    });
}

// ================= UPDATE =================
function updateQuantity(id, quantity) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart = cart.map(item=>{
        if((item.asin || item.id) === id){
            item.quantity = Number(quantity);
        }
        return item;
    });
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
}

// ================= REMOVE =================
function removeItem(id) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart = cart.filter(item => (item.asin || item.id) !== id);
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
}

// ================= CHECKOUT =================
function checkout() {
    alert("جارٍ الانتقال للدفع...");
}

// ================= WHATSAPP =================
function sendWhatsApp() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if(cart.length === 0){
        alert("السلة فارغة");
        return;
    }

    let message = "🛒 طلب جديد:%0A";
    cart.forEach(item=>{
        message += `- ${item.title || item.name} x${item.quantity || 1}%0A`;
    });

    window.open(`https://wa.me/201205271929?text=${message}`);
}

// ================= FAQ =================
const faqs = [
  {q:"هل يمكن الدفع عند الاستلام؟", a:"نعم عبر التواصل واتساب."},
  {q:"هل المنتجات أصلية؟", a:"نعم من أمازون."},
  {q:"كيف أتابع الطلب؟", a:"سيتم التواصل معك بعد الطلب."}
];

function renderFAQ(){
  const container=document.getElementById("faqSection");
  faqs.forEach(f=>{
    const p=document.createElement("p");
    p.innerHTML=`<strong>${f.q}</strong><br>${f.a}`;
    container.appendChild(p);
  });
}

// INIT
loadCart();
renderFAQ();
</script>

</body>
  </html>
