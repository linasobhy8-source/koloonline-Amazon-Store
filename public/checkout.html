<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Your Cart | Koloonline</title>

<!-- ================= GTM ================= -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8BN"></script>

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');

/* ================= TRACK EVENT ================= */
function trackEvent(eventName, params = {}) {
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: eventName,
    ...params
  });

  if (typeof gtag === "function") {
    gtag('event', eventName, params);
  }
}
</script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#232f3e;color:#fff;padding:15px;text-align:center;font-size:22px;}
.navbar{display:flex;justify-content:center;gap:10px;background:#37475a;padding:10px;}
.navbar a{color:#fff;text-decoration:none;padding:8px 12px;border-radius:6px;font-weight:bold;}
.navbar a.active{background:#ff9900;}

.products{padding:20px;display:grid;gap:15px;}
.card{background:#fff;padding:15px;border-radius:10px;text-align:center;}
.price{color:#b12704;font-weight:bold;}
.buy-btn{background:#ff9900;border:none;padding:10px;width:100%;margin-top:5px;border-radius:6px;font-weight:bold;}
.buy-btn.whatsapp{background:#25D366;color:#fff;}
.buy-btn.danger{background:#d9534f;color:#fff;}
.buy-btn.success{background:#28a745;color:#fff;}

.summary{max-width:600px;margin:auto;}
.trust{background:#e8f5e9;padding:10px;border-radius:6px;margin-top:10px;}
</style>

</head>

<body>

<header>🛒 Koloonline Cart</header>

<nav class="navbar">
  <a href="/">🏠 الرئيسية</a>
  <a href="/products">📦 المنتجات</a>
  <a href="/cart">🛒 السلة</a>
</nav>

<div id="cart" class="products"></div>
<div id="summary" class="summary"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

/* ================= VIEW CART ================= */
trackEvent("view_cart", {
  items: cart.length
});

/* ================= COUNTRY ================= */
function getCountry(){
let lang=navigator.language||"en-US";
if(lang.includes("ar")) return "EG";
if(lang.includes("pl")) return "PL";
if(lang.includes("en-CA")) return "CA";
return "US";
}

/* ================= AFFILIATE ================= */
function getAffiliateLink(item){
const country=getCountry();
let domain="amazon.com", tag="koloonlinesto-20";

if(country==="EG"){domain="amazon.eg";tag=item.tags?.egypt;}
if(country==="CA"){domain="amazon.ca";tag=item.tags?.canada;}
if(country==="PL"){domain="amazon.pl";tag=item.tags?.poland;}

return `https://${domain}/dp/${item.asin}?tag=${tag}`;
}

/* ================= RENDER ================= */
function renderCart(){
let container=document.getElementById("cart");
let summary=document.getElementById("summary");

if(cart.length===0){
container.innerHTML="<p style='text-align:center'>🛒 السلة فارغة</p>";
summary.innerHTML="";
return;
}

let html="";
let total=0;

cart.forEach((item,i)=>{
item.qty=item.qty||1;
total += item.price * item.qty;

html+=`
<div class="card">
<h3>${item.title}</h3>
<p class="price">$${item.price}</p>

<button class="buy-btn" onclick="increaseQty(${i})">➕</button>
<button class="buy-btn" onclick="decreaseQty(${i})">➖</button>
<button class="buy-btn danger" onclick="removeItem(${i})">❌</button>

<button class="buy-btn" onclick="window.open('${getAffiliateLink(item)}','_blank')">🔥 Buy</button>
<button class="buy-btn whatsapp" onclick="whatsapp('${item.title}')">📲 WhatsApp</button>
</div>
`;
});

container.innerHTML=html;

summary.innerHTML=`
<div class="card">
<h2>🛒 Summary</h2>
<p>Total: $${total.toFixed(2)}</p>

<div class="trust">
✔ Secure <br> ✔ Fast <br> ✔ Trusted
</div>

<button class="buy-btn success" onclick="checkout(${total})">Checkout</button>
<button class="buy-btn danger" onclick="clearCart()">Clear</button>
</div>
`;
}

/* ================= ACTIONS ================= */
function removeItem(i){
trackEvent("remove_from_cart",{index:i});
cart.splice(i,1);
save();
}

function increaseQty(i){
cart[i].qty++;
trackEvent("add_to_cart",{type:"increase"});
save();
}

function decreaseQty(i){
cart[i].qty>1?cart[i].qty--:cart.splice(i,1);
trackEvent("add_to_cart",{type:"decrease"});
save();
}

function clearCart(){
cart=[];
save();
}

/* ================= SAVE ================= */
function save(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

/* ================= WHATSAPP ================= */
function whatsapp(title){
trackEvent("whatsapp_click",{title});
window.open("https://wa.me/201205271929?text="+encodeURIComponent(title));
}

/* ================= CHECKOUT ================= */
function checkout(total){
trackEvent("begin_checkout",{
value: total,
currency:"USD"
});

trackEvent("purchase_intent",{
value: total
});

alert("تم التوجه للشراء ✅");
window.location.href="thankyou.html";
}

/* INIT */
renderCart();
</script>

</body>
</html>
