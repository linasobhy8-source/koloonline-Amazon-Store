<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛒 Your Cart | Koloonline</title>

<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8BN"></script>

<!-- ================= GA4 ================= -->

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

/* HEADER */
header{
  background:#232f3e;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
}

/* NAVBAR */
.navbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  background:#37475a;
  padding:10px;
}
.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 12px;
  border-radius:6px;
  font-weight:bold;
}
.navbar a:hover{background:#e68a00;}
.navbar a.active{background:#ff9900;}

/* CART */
.products{padding:20px;display:grid;gap:15px;}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}
.card img{
  width:100%;
  height:180px;
  object-fit:contain;
}
.price{color:#b12704;font-weight:bold;font-size:18px;}

.buy-btn{
  background:#ff9900;
  border:none;
  padding:10px;
  width:100%;
  margin:5px 0;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
.buy-btn:hover{background:#e68a00;}

.buy-btn.whatsapp{background:#25D366;color:#fff;}
.buy-btn.success{background:#28a745;color:#fff;}
.buy-btn.danger{background:#d9534f;color:#fff;}

.summary{max-width:600px;margin:auto;}

.trust{
  background:#e8f5e9;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
}

/* FAQ */
.faq{
  max-width:600px;
  margin:20px auto;
}
.faq p{
  background:#fff;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
}

/* MOBILE */
@media(max-width:600px){
  .products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>🛒 Koloonline Cart</header>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/">🏠 الرئيسية</a>
  <a href="/products">📦 المنتجات</a>
  <a href="/cart">🛒 السلة</a>
  <a href="/blog">📰 المدونة</a>
  <a href="/contact">✉️ اتصل بنا</a>
  <a href="/dashboard">📊 لوحة التحكم</a>
</nav>

<script>
const currentPath = window.location.pathname.toLowerCase();
document.querySelectorAll('.navbar a').forEach(link=>{
  if(link.getAttribute('href') === currentPath){
    link.classList.add('active');
  }
});
</script>

<!-- CART -->
<div id="cart" class="products"></div>
<div id="summary" class="summary"></div>

<!-- FAQ -->
<div class="faq" id="faqSection"></div>

<script>
// ================= CART =================
let cart = JSON.parse(localStorage.getItem("cart")||"[]");

// ================= TRACKING =================
async function trackEvent(eventType,data){
try{
await fetch("/api/track",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({event:eventType,data,page:"cart",time:new Date().toISOString()})
});
}catch(e){}
}

// ================= SAVE =================
function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

// ================= COUNTRY =================
function getCountry(){
let lang=navigator.language||"en-US";
if(lang.includes("ar")) return "EG";
if(lang.includes("pl")) return "PL";
if(lang.includes("en-CA")) return "CA";
return "US";
}

// ================= AFFILIATE =================
function getAffiliateLink(item){
const country=getCountry();
let domain="amazon.com", tag="koloonlinesto-20";

if(country==="EG"){domain="amazon.eg";tag=item.tags?.egypt;}
if(country==="CA"){domain="amazon.ca";tag=item.tags?.canada;}
if(country==="PL"){domain="amazon.pl";tag=item.tags?.poland;}

return `https://${domain}/dp/${item.asin}?tag=${tag}`;
}

// ================= RENDER =================
function renderCart(){
let container=document.getElementById("cart");
let summary=document.getElementById("summary");

if(cart.length===0){
container.innerHTML="<p style='text-align:center'>🛒 السلة فارغة</p>";
summary.innerHTML="";
return;
}

let html="";
let totalItems=0,totalPrice=0;

cart.forEach((item,index)=>{
item.qty=item.qty||1;
item.price=parseFloat(item.price||0);

totalItems+=item.qty;
totalPrice+=item.price*item.qty;

html+=`
<div class="card">
<img src="${item.image}">
<h3>${item.title}</h3>
<p class="price">$${item.price}</p>

<button class="buy-btn" onclick="increaseQty(${index})">➕</button>
<button class="buy-btn" onclick="decreaseQty(${index})">➖</button>
<button class="buy-btn danger" onclick="removeItem(${index})">❌</button>

<button class="buy-btn" onclick="window.open('${getAffiliateLink(item)}','_blank')">🔥 Buy</button>
<button class="buy-btn whatsapp" onclick="orderWhatsApp('${item.title}')">📲 WhatsApp</button>
</div>
`;
});

container.innerHTML=html;

summary.innerHTML=`
<div class="card">
<h2>🛒 Summary</h2>
<p>Total Items: ${totalItems}</p>
<p>Total Price: $${totalPrice.toFixed(2)}</p>

<div class="trust">
✔ Secure <br> ✔ Fast <br> ✔ Trusted
</div>

<button class="buy-btn success" onclick="checkout()">Checkout</button>
<button class="buy-btn danger" onclick="clearCart()">Clear</button>
</div>
`;
}

// ================= ACTIONS =================
function removeItem(i){cart.splice(i,1);saveCart();}
function increaseQty(i){cart[i].qty+=1;saveCart();}
function decreaseQty(i){cart[i].qty>1?cart[i].qty--:cart.splice(i,1);saveCart();}
function clearCart(){cart=[];saveCart();}

// ================= WHATSAPP =================
function orderWhatsApp(title){
window.open("https://wa.me/201205271929?text="+encodeURIComponent("أريد طلب: "+title));
}

// ================= CHECKOUT =================
function checkout(){
if(cart.length===0){alert("السلة فارغة");return;}
alert("تم الطلب ✅");
cart=[];
saveCart();
window.location.href="thankyou.html";
}

// ================= FAQ =================
const faqs=[
{q:"هل الدفع آمن؟",a:"نعم 100%"},
{q:"هل المنتجات أصلية؟",a:"من أمازون"},
{q:"هل يوجد استرجاع؟",a:"حسب سياسة أمازون"}
];

function renderFAQ(){
const container=document.getElementById("faqSection");
faqs.forEach(f=>{
const p=document.createElement("p");
p.innerHTML=`<strong>${f.q}</strong><br>${f.a}`;
container.appendChild(p);
});
}

// INIT
renderCart();
renderFAQ();
</script>

</body>
</html>
