<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card h2{
  margin:0;
  font-size:28px;
  color:#ff9900;
}

/* TABLE */
table{
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#232f3e;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:15px;
  background:#232f3e;
  padding:10px;
}

.nav a{
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- GTM NOSCRIPT -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNQM8KBN"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>📊 Koloonline Analytics Dashboard</header>

<nav class="nav">
  <a href="/">Store</a>
  <a href="/dashboard">Dashboard</a>
</nav>

<!-- ================= STATS ================= -->
<div class="grid">
  <div class="card">
    <p>Total Clicks</p>
    <h2 id="clicks">0</h2>
  </div>

  <div class="card">
    <p>Total Orders</p>
    <h2 id="orders">0</h2>
  </div>

  <div class="card">
    <p>WhatsApp Leads</p>
    <h2 id="whatsapp">0</h2>
  </div>
</div>

<!-- ================= TABLE ================= -->
<table>
  <thead>
    <tr>
      <th>ASIN</th>
      <th>Clicks</th>
      <th>Orders</th>
      <th>WhatsApp</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>

const GA_ID = "G-YS8L61XLPR";
const GTM_ID = "GTM-KNQM8KBN";

/* ================= TRACK PAGE VIEW ================= */
gtag('event','dashboard_view', {
  page: 'dashboard',
  source: document.referrer || 'direct'
});

/* ================= FETCH ANALYTICS ================= */
async function loadAnalytics(){
  try{
    const res = await fetch("/api/analytics");
    const data = await res.json();

    // Overview
    document.getElementById("clicks").innerText = data.overview?.totalClicks || 0;
    document.getElementById("orders").innerText = data.overview?.totalOrders || 0;
    document.getElementById("whatsapp").innerText = data.overview?.totalWhatsApp || 0;

    // Table
    const table = document.getElementById("table");
    table.innerHTML = "";

    (data.topProducts || []).forEach(p=>{
      table.innerHTML += `
        <tr onclick="trackProduct('${p.asin}')">
          <td>${p.asin}</td>
          <td>${p.clicks}</td>
          <td>${p.orders}</td>
          <td>${p.whatsapp}</td>
        </tr>
      `;
    });

  }catch(e){
    console.log("Dashboard error:", e);
  }
}

/* ================= TRACK PRODUCT CLICK ================= */
function trackProduct(asin){
  gtag('event','product_click',{
    asin: asin,
    source: 'dashboard'
  });
}

/* ================= AUTO REFRESH ================= */
setInterval(loadAnalytics, 10000);
loadAnalytics();

</script>

</body>
</html>
