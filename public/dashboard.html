<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card h2{
  margin:0;
  font-size:28px;
  color:#ff9900;
}

/* TABLE */
table{
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#232f3e;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:15px;
  background:#232f3e;
  padding:10px;
}

.nav a{
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header>📊 Koloonline SaaS Dashboard</header>

<nav class="nav">
  <a href="/">Store</a>
  <a href="/dashboard.html">Dashboard</a>
</nav>

<!-- ================= STATS ================= -->
<div class="grid">
  <div class="card">
    <p>Total Clicks</p>
    <h2 id="clicks">0</h2>
  </div>

  <div class="card">
    <p>Total Orders</p>
    <h2 id="orders">0</h2>
  </div>

  <div class="card">
    <p>WhatsApp Leads</p>
    <h2 id="whatsapp">0</h2>
  </div>
</div>

<!-- ================= TABLE ================= -->
<table>
  <thead>
    <tr>
      <th>ASIN</th>
      <th>Clicks</th>
      <th>Orders</th>
      <th>WhatsApp</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
// ================= LOAD ANALYTICS =================
async function loadAnalytics(){
  try{
    const res = await fetch("/api/analytics");
    const data = await res.json();

    document.getElementById("clicks").innerText = data.totalClicks;
    document.getElementById("orders").innerText = data.totalOrders;
    document.getElementById("whatsapp").innerText = data.totalWhatsApp;

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.topProducts.forEach(p=>{
      table.innerHTML += `
        <tr>
          <td>${p.asin}</td>
          <td>${p.clicks}</td>
          <td>${p.orders}</td>
          <td>${p.whatsapp}</td>
        </tr>
      `;
    });

  }catch(e){
    console.log("Dashboard error:", e);
  }
}

loadAnalytics();
</script>

</body>
</html>
