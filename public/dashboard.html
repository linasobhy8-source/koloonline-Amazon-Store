<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {font-family:Arial; text-align:center; background:#f5f5f5;}
.box {background:#fff; padding:20px; margin:10px; display:inline-block; border-radius:10px;}
</style>
</head>

<body>

<h1>📊 Live Dashboard</h1>

<div class="box">Clicks: <span id="clicks">0</span></div>
<div class="box">Orders: <span id="orders">0</span></div>
<div class="box">WhatsApp: <span id="whatsapp">0</span></div>

<h2>Top Products</h2>
<div id="products"></div>

<script>
async function loadDashboard(){
  const res = await fetch("/api/analytics");
  const data = await res.json();

  document.getElementById("clicks").innerText = data.totalClicks;
  document.getElementById("orders").innerText = data.totalOrders;
  document.getElementById("whatsapp").innerText = data.totalWhatsApp;

  let html="";
  for(let p in data.products){
    let item = data.products[p];
    html += `<p>${p} → 🖱 ${item.clicks} | 🛒 ${item.orders} | 📲 ${item.whatsapp}</p>`;
  }

  document.getElementById("products").innerHTML = html;
}

setInterval(loadDashboard, 3000);
loadDashboard();
</script>

</body>
</html>
