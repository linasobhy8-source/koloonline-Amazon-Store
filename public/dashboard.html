<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📊 Dashboard | Koloonline</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#232f3e;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
  position:sticky;
  top:0;
  z-index:1000;
}

/* NAVBAR */
.navbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  background:#37475a;
  padding:10px;
}
.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 12px;
  border-radius:6px;
  font-weight:bold;
}
.navbar a:hover{background:#e68a00;}
.navbar a.active{background:#ff9900;}

/* DASHBOARD */
.container{
  max-width:1000px;
  margin:20px auto;
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h2{
  margin:0;
  font-size:28px;
  color:#232f3e;
}

.card p{
  margin:5px 0;
  color:#555;
}

/* PRODUCTS */
.product{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* FAQ */
.faq{
  max-width:900px;
  margin:30px auto;
}
.faq p{
  background:#fff;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
}

/* WHATSAPP FLOAT */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  color:#fff;
  padding:12px 15px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width:600px){
  .cards{grid-template-columns:1fr;}
}
</style>

</head>

<body>

<header>📊 Koloonline Dashboard</header>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html">🏠 الرئيسية</a>
  <a href="products.html">📦 المنتجات</a>
  <a href="cart.html">🛒 السلة</a>
  <a href="blog.html">📰 المدونة</a>
  <a href="contact.html">✉️ اتصل بنا</a>
  <a href="dashboard.html">📊 لوحة التحكم</a>
</nav>

<script>
const currentPath = window.location.pathname.toLowerCase();
document.querySelectorAll('.navbar a').forEach(link=>{
  if(currentPath.includes(link.getAttribute('href'))){
    link.classList.add('active');
  }
});
</script>

<!-- DASHBOARD -->
<div class="container">

  <div class="cards">
    <div class="card">
      <h2 id="clicks">0</h2>
      <p>🖱️ Clicks</p>
    </div>

    <div class="card">
      <h2 id="orders">0</h2>
      <p>🛒 Orders</p>
    </div>

    <div class="card">
      <h2 id="whatsapp">0</h2>
      <p>📲 WhatsApp</p>
    </div>
  </div>

  <div id="products"></div>

</div>

<!-- FAQ -->
<div class="faq" id="faqSection"></div>

<!-- WhatsApp Floating Button -->
<a class="whatsapp-float" 
   href="https://wa.me/201205271929" 
   target="_blank">
   📲 واتساب
</a>

<script>
// ================= TRACKING =================
function trackEvent(type,data){
  fetch("/api/track",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      event:type,
      data:data,
      page:"dashboard",
      time:new Date().toISOString()
    })
  }).catch(()=>{});
}

// ================= FETCH ANALYTICS =================
async function fetchAnalytics(){
  try{
    const res = await fetch("/api/analytics");
    const data = await res.json();

    if(!data.success) return;

    document.getElementById("clicks").innerText = data.totalClicks || 0;
    document.getElementById("orders").innerText = data.totalOrders || 0;
    document.getElementById("whatsapp").innerText = data.totalWhatsApp || 0;

    renderProducts(data.topProducts || []);

  }catch(e){
    console.log("Error loading analytics");
  }
}

// ================= PRODUCTS =================
function renderProducts(products){
  const container = document.getElementById("products");
  container.innerHTML = "<h3>🔥 Top Products</h3>";

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <p><b>${p.asin}</b></p>
      <p>🖱️ Clicks: ${p.clicks}</p>
      <p>🛒 Orders: ${p.orders}</p>
      <p>📲 WhatsApp: ${p.whatsapp}</p>
      <button onclick="trackEvent('product_view','${p.asin}')">
        📊 Track
      </button>
    `;

    container.appendChild(div);
  });
}

// ================= FAQ =================
const faqs=[
{q:"هل البيانات مباشرة؟",a:"نعم يتم التحديث كل 10 ثواني"},
{q:"هل يمكن تتبع كل منتج؟",a:"نعم عبر Top Products"},
{q:"هل يظهر الطلبات؟",a:"نعم في Orders"},
{q:"هل يوجد تتبع واتساب؟",a:"نعم يتم تسجيل كل ضغطه"}
];

function renderFAQ(){
  const container=document.getElementById("faqSection");
  faqs.forEach(f=>{
    const p=document.createElement("p");
    p.innerHTML=`<strong>${f.q}</strong><br>${f.a}`;
    container.appendChild(p);
  });
}

// ================= INIT =================
fetchAnalytics();
renderFAQ();

// ================= AUTO REFRESH =================
setInterval(fetchAnalytics,10000);
</script>

</body>
</html>
