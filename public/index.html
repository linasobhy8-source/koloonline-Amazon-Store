<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloonline Store</title>

<!-- 🔥 Tracking Helper -->
<script>
function trackEvent(type, value){
  if(typeof gtag === "function"){
    gtag('event', type, {
      event_category: "engagement",
      event_label: value
    });
  }

  if(window.dataLayer){
    window.dataLayer.push({
      event: type,
      value: value
    });
  }

  console.log("Tracked:", type, value);
}

// page view
trackEvent("page_view", window.location.pathname);
</script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* HEADER */
header{
  background:#131921;
  color:white;
  padding:10px 15px;
}

.logo{
  height:50px;
}

/* HEADER FLEX */
.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  flex-wrap:wrap;
}

/* SEARCH */
.search-bar{
  display:flex;
  flex:1;
  gap:10px;
}

.search-bar input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:4px;
}

.search-bar button{
  padding:10px 15px;
  background:#febd69;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

/* NAVBAR */
.navbar{
  background:#232f3e;
  display:flex;
  gap:15px;
  padding:10px;
  flex-wrap:wrap;
}

.navbar a{
  color:white;
  text-decoration:none;
}

.navbar a:hover{
  text-decoration:underline;
}

/* PRODUCTS */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  width:250px;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.card button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff9900;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.card button:hover{
  background:#e68a00;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-top">

    <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" class="logo">

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search products...">
      <button onclick="searchProducts()">Search</button>
    </div>

  </div>
</header>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/product">📦 Products</a>
  <a href="/cart">🛒 Cart</a>
  <a href="/blog">📰 Blog</a>
  <a href="/contact">📞 Contact</a>
  <a href="/dashboard">📊 Dashboard</a>
</nav>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<script>
// ================= PRODUCTS =================
const products = [
  {
    title:"🔥 Smart Watch Pro",
    image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",
    asin:"B09V7Z4TJG"
  },
  {
    title:"🎧 Wireless Earbuds",
    image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",
    asin:"B08G9P7N2X"
  }
];

// ================= AFFILIATE =================
function getLink(asin){
  return `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;
}

// ================= LOAD =================
function load(){
  const container=document.getElementById("products");
  container.innerHTML="";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>

        <button onclick="trackEvent('product_click','${p.asin}'); window.open('${getLink(p.asin)}','_blank')">
          🛒 Buy on Amazon
        </button>
      </div>
    `;
  });
}

// ================= SEARCH =================
function searchProducts(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const container=document.getElementById("products");
  container.innerHTML="";

  trackEvent("search", q);

  products.filter(p=>p.title.toLowerCase().includes(q))
  .forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>

        <button onclick="trackEvent('product_click','${p.asin}'); window.open('${getLink(p.asin)}','_blank')">
          🛒 Buy on Amazon
        </button>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
