<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloonline SaaS Store</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* ================= HEADER ================= */
header{
  background:#131921;
  color:white;
  padding:10px 15px;
}

/* LOGO */
.logo{
  height:50px;
  vertical-align:middle;
}

/* SEARCH */
.search-bar{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.search-bar input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:4px;
}

.search-bar button{
  padding:10px 15px;
  background:#febd69;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

/* ================= NAVBAR ================= */
.navbar{
  background:#232f3e;
  display:flex;
  gap:15px;
  padding:10px;
  flex-wrap:wrap;
}

.navbar a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

.navbar a:hover{
  text-decoration:underline;
}

/* ================= CONTAINER ================= */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

/* ================= CARD ================= */
.card{
  background:white;
  width:250px;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
