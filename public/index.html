<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koloonline SaaS Store</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eaeded;
}

/* ================= HEADER ================= */
header{
  background:#131921;
  color:white;
  padding:10px 15px;
}

/* LOGO */
.logo{
  height:50px;
  vertical-align:middle;
}

/* HEADER FLEX */
.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  flex-wrap:wrap;
}

/* SEARCH */
.search-bar{
  display:flex;
  flex:1;
  gap:10px;
}

.search-bar input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:4px;
}

.search-bar button{
  padding:10px 15px;
  background:#febd69;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

/* ================= NAVBAR ================= */
.navbar{
  background:#232f3e;
  display:flex;
  gap:15px;
  padding:10px;
  flex-wrap:wrap;
}

.navbar a{
  color:white;
  text-decoration:none;
  font-size:14px;
}

.navbar a:hover{
  text-decoration:underline;
}

/* ================= PRODUCTS ================= */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  width:250px;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.card button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff9900;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.card button:hover{
  background:#e68a00;
}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>

  <div class="header-top">

    <!-- LOGO -->
    <img src="https://i.postimg.cc/9fVfC1Y4/1000276862.png" class="logo">

    <!-- SEARCH AMAZON STYLE -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search Amazon products...">
      <button onclick="searchProducts()">Search</button>
    </div>

  </div>

</header>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <a href="#">🏠 Home</a>
  <a href="#">🔥 Deals</a>
  <a href="#">📦 Products</a>
  <a href="#">🛒 Cart</a>
  <a href="#">📞 Contact</a>
</nav>

<!-- ================= PRODUCTS ================= -->
<div class="container" id="products"></div>

<script>
// ================= PRODUCTS =================
const products = [
  {
    title:"🔥 Smart Watch Pro",
    image:"https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg",
    link:"https://www.amazon.com/dp/B09V7Z4TJG?tag=koloonlinesto-20"
  },
  {
    title:"🎧 Wireless Earbuds",
    image:"https://m.media-amazon.com/images/I/61u48FEs0rL._AC_SL1000_.jpg",
    link:"https://www.amazon.com/dp/B08G9P7N2X?tag=koloonlinesto-20"
  }
];

// ================= LOAD =================
function load(){
  const container=document.getElementById("products");
  container.innerHTML="";

  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>
        <button onclick="window.open('${p.link}','_blank')">
          🛒 Buy on Amazon
        </button>
      </div>
    `;
  });
}

// ================= SEARCH =================
function searchProducts(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const container=document.getElementById("products");
  container.innerHTML="";

  products.filter(p=>p.title.toLowerCase().includes(q))
  .forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.title}</h3>
        <button onclick="window.open('${p.link}','_blank')">
          🛒 Buy on Amazon
        </button>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
