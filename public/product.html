<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Details | Koloonline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ================= GTM ================= -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8BN"></script>

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YS8L61XLPR');

function trackEvent(eventName, params = {}) {
  window.dataLayer.push({ event: eventName, ...params });
  if (typeof gtag === "function") {
    gtag('event', eventName, params);
  }
}
</script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;color:#111;}
header{background:#232f3e;color:#fff;padding:15px;text-align:center;font-size:22px;font-weight:bold;}
.card{background:#fff;padding:20px;border-radius:10px;max-width:600px;margin:20px auto;text-align:center;}
.card img{width:100%;max-height:300px;object-fit:contain;}
.price{color:#b12704;font-size:22px;font-weight:bold;}
.buy-btn{background:#ff9900;border:none;width:100%;padding:12px;margin-top:10px;border-radius:6px;cursor:pointer;}
.buy-btn:hover{background:#e68a00;}
.section{background:#fff;margin:20px auto;padding:20px;max-width:700px;border-radius:10px;}
</style>
</head>

<body>

<header>🔥 Koloonline Product</header>

<div id="product">Loading...</div>

<div class="section">
<h2>⭐ Reviews</h2>
<div>⭐⭐⭐⭐⭐ Amazing product!</div>
<div>⭐⭐⭐⭐ Good quality</div>
</div>

<div class="section">
<h2>🔥 Related Products</h2>
<div id="related"></div>
</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "onlinekoloonlineonline-a9979.firebaseapp.com",
  projectId: "onlinekoloonlineonline-a9979",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];
let currentProduct = null;

/* ================= GET ASIN FROM URL ================= */
const urlParams = new URLSearchParams(window.location.search);
const asin = urlParams.get("asin");

/* ================= LOAD FROM FIRESTORE ================= */
async function loadProducts() {
  const snap = await getDocs(collection(db, "products"));

  products = snap.docs.map(doc => doc.data());

  currentProduct = products.find(p => p.asin === asin);

  loadProduct();
  loadRelated();
}

/* ================= MAIN PRODUCT ================= */
function loadProduct() {
  if (!currentProduct) {
    document.getElementById("product").innerHTML = "<h2>Product not found ❌</h2>";
    return;
  }

  const p = currentProduct;

  trackEvent("product_view", {
    asin: p.asin,
    title: p.title
  });

  document.getElementById("product").innerHTML = `
  <div class="card">
    <img src="${p.image}">
    <h2>${p.title}</h2>
    <p class="price">$${p.price}</p>

    <button class="buy-btn" onclick="window.open('${p.link}','_blank')">
      🔥 Buy Now
    </button>
  </div>`;
}

/* ================= RELATED PRODUCTS ================= */
function loadRelated() {
  document.getElementById("related").innerHTML = products
    .filter(p => p.asin !== asin)
    .map(p => `
      <div style="margin:10px;text-align:center;">
        <img src="${p.image}" width="100"><br>
        <b>${p.title}</b><br>
        <button onclick="location.href='product.html?asin=${p.asin}'">
          View
        </button>
      </div>
    `).join("");
}

/* ================= START ================= */
loadProducts();

</script>

</body>
</html>
