<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Order Confirmed | Koloonline</title>

<meta name="description" content="Your order is confirmed.">

<!-- ================= GTM ================= -->
<script async src="https://www.googletagmanager.com/gtm.js?id=GTM-KNQM8BN"></script>

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-YS8L61XLPR');

/* ================= TRACK EVENT ================= */
function trackEvent(eventName, params = {}) {
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: eventName,
    ...params
  });

  if (typeof gtag === "function") {
    gtag('event', eventName, params);
  }
}
</script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;text-align:center;}
header{background:#232f3e;color:#fff;padding:15px;font-size:22px;}
.box{max-width:600px;margin:40px auto;background:#fff;padding:30px;border-radius:12px;}
.buy-btn{background:#ff9900;border:none;padding:12px;width:100%;margin-top:10px;}
.buy-btn.secondary{background:#333;color:#fff;}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:10px;}
.price{color:#b12704;font-weight:bold;}
.whatsapp{background:#25D366;color:#fff;}
</style>

</head>

<body>

<header>🎉 Thank You!</header>

<div class="box">
<h2>Order Confirmed Successfully ✅</h2>

<div id="orderInfo"></div>
<div id="orderTotal"></div>

<button class="buy-btn secondary" onclick="goHome()">🏠 Back to Store</button>

<div id="upsellProducts"></div>
</div>

<script>
/* ================= PAGE VIEW ================= */
trackEvent("page_view", {
  page: "thank_you"
});

/* ================= DATA ================= */
let orders = JSON.parse(localStorage.getItem("orders") || "[]");
let lastOrder = orders[orders.length - 1] || {};
let orderId = lastOrder.id || ("KO-" + Math.floor(Math.random()*999999));
let total = lastOrder.totalPrice || 0;

/* ================= SHOW ================= */
document.getElementById("orderInfo").innerHTML = "Order ID: " + orderId;
document.getElementById("orderTotal").innerHTML = "Total: $" + total;

/* ================= PURCHASE TRACK ================= */
trackEvent("purchase", {
  transaction_id: orderId,
  value: total,
  currency: "USD",
  items: lastOrder.items || []
});

/* ================= PRODUCTS ================= */
const products = lastOrder.items || [];

/* ================= UPSELL ================= */
function renderUpsell(){
  const container = document.getElementById("upsellProducts");

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h4>${p.title}</h4>
      <p class="price">$${p.price}</p>

      <button class="buy-btn" onclick="buyUpsell('${p.asin}','${p.title}')">
        🔥 Buy Now
      </button>

      <button class="buy-btn whatsapp" onclick="whatsapp('${p.title}')">
        📲 WhatsApp
      </button>
    `;

    container.appendChild(div);
  });
}

/* ================= UPSELL CLICK ================= */
function buyUpsell(asin,title){
  trackEvent("upsell_click", {
    asin: asin,
    title: title
  });

  window.open(`https://amazon.com/dp/${asin}`,"_blank");
}

/* ================= WHATSAPP ================= */
function whatsapp(title){
  trackEvent("whatsapp_click", {
    title: title
  });

  window.open("https://wa.me/201205271929?text="+encodeURIComponent(title));
}

/* ================= HOME ================= */
function goHome(){
  window.location.href="index.html";
}

/* ================= INIT ================= */
renderUpsell();
localStorage.removeItem("cart");
</script>

</body>
</html>
