<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 Order Confirmed | Koloonline</title>

<meta name="description" content="Your order is confirmed. Enjoy exclusive offers and deals now.">

<link rel="icon" href="favicon.ico">

<!-- ================= FB PIXEL ================= -->
<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window,document,'script',

fbq('init','353894198840203');
fbq('track','PageView');
</script>

<!-- ================= GA4 ================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YS8L61XLPR"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-YS8L61XLPR');
</script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;text-align:center}

header{
background:#232f3e;color:#fff;
padding:15px;font-size:22px;
}

.box{
max-width:600px;margin:40px auto;
background:#fff;padding:30px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.buy-btn{
background:#ff9900;border:none;
padding:12px;width:100%;
margin-top:10px;
font-weight:bold;cursor:pointer;
border-radius:6px;
}

.secondary{
background:#333;color:#fff;
}

.trust{
background:#e8f5e9;padding:10px;
border-radius:6px;margin-top:15px;
font-size:14px;
}

.upsell{
margin-top:20px;
padding:15px;
background:#fff3cd;
border-radius:8px;
}
</style>

</head>

<body>

<header>🎉 Thank You!</header>

<div class="box">

<h2>Order Confirmed Successfully ✅</h2>
<p>Your order is being processed 🚚</p>

<div id="orderInfo"></div>
<div id="orderTotal" style="margin-top:10px;font-weight:bold;"></div>

<div class="trust">
✔ Secure Checkout <br>
✔ Fast Delivery <br>
✔ Trusted Store
</div>

<!-- 🔥 UPSELL -->
<div class="upsell">
<h3>🔥 Special Offer (Limited Time)</h3>
<p>Get this trending product before it’s gone!</p>

<button class="buy-btn" onclick="upsell()">
🚀 Claim Offer Now
</button>
</div>

<button class="buy-btn secondary" onclick="goHome()">
🏠 Back to Store
</button>

</div>

<script>

/* ================= GET ORDER ================= */
let orders = JSON.parse(localStorage.getItem("orders") || "[]");
let lastOrder = orders[orders.length - 1] || {};

let orderId = lastOrder.id || ("KO-" + Math.floor(Math.random()*999999));

let total = lastOrder.totalPrice || 0;

/* ================= SHOW ================= */
document.getElementById("orderInfo").innerHTML =
"🧾 Order ID: " + orderId;

document.getElementById("orderTotal").innerHTML =
"💰 Total: $" + total.toFixed(2);

/* ================= TRACK REAL PURCHASE ================= */
fbq('track', 'Purchase', {
value: total,
currency: 'USD',
content_ids: lastOrder.items?.map(i=>i.asin) || []
});

gtag('event', 'purchase', {
transaction_id: orderId,
value: total,
currency: 'USD'
});

/* ================= SMART UPSELL ================= */
function upsell(){

let product = lastOrder.items?.[0];

let asin = product?.asin || "B09V7Z4TJG";

let link = `https://www.amazon.com/dp/${asin}?tag=koloonlinesto-20`;

fbq('track','InitiateCheckout');
gtag('event','begin_checkout');

window.location.href = link;
}

/* ================= HOME ================= */
function goHome(){
window.location.href = "index.html";
}

/* ================= CLEAN CART ================= */
localStorage.removeItem("cart");

</script>

</body>
</html>
