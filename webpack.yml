# linasobhy8-source/express-js-on-vercel/webpack.yml
name: Build & Deploy ExpressJS with Webpack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 24.x]  # اختبارات على عدة نسخ Node.js
    steps:
      # 1. استيراد الكود
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # 3. تثبيت الاعتمادات
      - name: Install dependencies
        run: npm install

      # 4. بناء المشروع باستخدام Webpack
      - name: Build project
        run: npm run build || echo "No build script, skipped"

      # 5. تشغيل الاختبارات إن وجدت
      - name: Run tests
        run: npm test || echo "No tests, skipped"

      # 6. نشر تلقائي على Vercel (مرة واحدة فقط بعد انتهاء كل النسخ)
      - name: Deploy to Vercel
        if: matrix.node-version == '24.x'
        run: npx vercel --prod --confirm
